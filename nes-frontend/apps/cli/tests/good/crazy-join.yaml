      - name: id3
        type: UINT64
  - name: stream2
    schema:
      - name: timestamp2
        type: UINT64
      - name: id2
        type: UINT64

physical:
  - logical: stream
    parser_config:
      TYPE: CSV
      FIELD_DELIMITER: ","
    type: Generator
    source_config:
      GENERATOR_RATE_TYPE: FIXED
      GENERATOR_RATE_CONFIG: emit_rate 10
      STOP_GENERATOR_WHEN_SEQUENCE_FINISHES: ONE
      SEED: 1
      GENERATOR_SCHEMA: |
        SEQUENCE UINT64 0 100000 1000
        SEQUENCE UINT64 0 100 1
