query: |
  SELECT *
  FROM stream
  INTO VOID_SINK

models:
  - name: iris
    path: /tmp/iris.onnx
    input:
      - name: p1
        type: FLOAT32
      - name: p2
        type: FLOAT32
      - name: p3
        type: FLOAT32
      - name: p4
        type: FLOAT32
    output:
      - name: setosa
        type: FLOAT32
      - name: versicolor
        type: FLOAT32
      - name: virginica
        type: FLOAT32

sinks:
  - name: VOID_SINK
    schema:
      - name: stream$p1
        type: FLOAT32
      - name: stream$p2
        type: FLOAT32
      - name: stream$p3
        type: FLOAT32
      - name: stream$p4
        type: FLOAT32
    type: Void
    config: { }
    parser_config: { }

logical:
  - name: stream
    schema:
      - name: p1
        type: FLOAT32
      - name: p2
        type: FLOAT32
      - name: p3
        type: FLOAT32
      - name: p4
        type: FLOAT32

physical:
  - logical: stream
    parser_config:
      type: CSV
      fieldDelimiter: ","
    type: Generator
    source_config:
      generator_rate_type: FIXED
      generator_rate_config: emit_rate 10
      stop_generator_when_sequence_finishes: ONE
      seed: 1
      generator_schema: |
        NORMAL_DISTRIBUTION FLOAT32 0 1
        NORMAL_DISTRIBUTION FLOAT32 0 1
        NORMAL_DISTRIBUTION FLOAT32 0 1
        NORMAL_DISTRIBUTION FLOAT32 0 1
