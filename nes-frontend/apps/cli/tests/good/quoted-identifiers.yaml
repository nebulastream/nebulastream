sinks:
  - name: '"quotedSink"'
    host: worker-1:8080
    schema:
      - name: '"projectedValue"'
        type: UINT64
      - name: A
        type: UINT64
    type: Void

logical:
  - name: '"quotedSource"'
    schema:
      - name: '"mixedValue"'
        type: UINT64
      - name: '"A"'
        type: UINT64

physical:
  - logical: '"quotedSource"'
    host: worker-1:8080
    parser_config:
      type: CSV
    type: Generator
    source_config:
      generator_rate_type: FIXED
      generator_rate_config: emit_rate 10
      stop_generator_when_sequence_finishes: NONE
      generator_schema: |
        SEQUENCE UINT64 0 10000000 1, SEQUENCE UINT64 0 10000000 1

workers:
  - host: worker-1:8080
    data_address: worker-1:9090
