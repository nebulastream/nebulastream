query: |
  SELECT timestamp, id
  FROM stream
  INTO sink;
sinks:
  - name: sink
    schema:
      - name: stream$timestamp
        type: UINT64
      - name: stream$id
        type: UINT64
    type: File
    config:
      file_path: out.csv
      input_format: CSV
    parser_config: { }

logical:
  - name: stream
    schema:
      - name: timestamp
        type: UINT64
      - name: id
        type: UINT64

physical:
  - logical: stream
    parser_config:
      type: CSV
      fieldDelimiter: ","
    type: Generator
    source_config:
      generator_rate_type: FIXED
      generator_rate_config: emit_rate 10
      stop_generator_when_sequence_finishes: ONE
      seed: 1
      generator_schema: |
        SEQUENCE UINT64 0 100000 1000
        SEQUENCE UINT64 0 100 1
optimizer:
  test_invalid_optimizer_config_name: INVALID
