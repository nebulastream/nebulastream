# Tests distributed query planning with disconnected topology.
# The source node connects to an intermediate node, but the intermediate node
# does not connect to the sink node. Expected: placement fails with
# "topology is not connected" because there is no path from source to sink.

query: |
  SELECT * FROM stream INTO sink

sinks:
  - name: sink
    schema: [ stream$ts ]
    host: "sink-node:8080"

logical:
  - name: stream
    schema: [ ts ]

physical:
  - logical: stream
    host: "source-node:8080"

workers:
  - host: "source-node:8080"
    max_operators: 10
    downstream:
      - "intermediate-node:8080"
  - host: "intermediate-node:8080"
    max_operators: 0
  - host: "sink-node:8080"
    max_operators: 10
