# Topology:
#
#   ┌──────────────────────────┐
#   │  node3  (cap: 10000)     │
#   │  S: GENERATOR_SOURCE     │
#   └────────────┬─────────────┘
#                │
#                ▼
#   ┌──────────────────────────┐
#   │  node2  (cap: 10000)     │
#   └────────────┬─────────────┘
#                │
#                ▼
#   ┌──────────────────────────┐
#   │  node1  (cap: 10000)     │
#   │  K: VOID_SINK            │
#   └──────────────────────────┘
#
#   node3 ─► node2 ─► node1

query: |
  SELECT * FROM GENERATOR_SOURCE INTO VOID_SINK

sinks:
  - name: VOID_SINK
    host_addr: node1:8080
    schema:
      - name: GENERATOR_SOURCE$DOUBLE
        type: FLOAT64
    sink_type: Print
    config:
      output_format: CSV

logical:
  - name: GENERATOR_SOURCE
    schema:
      - name: DOUBLE
        type: FLOAT64

physical:
  - logical_source: GENERATOR_SOURCE
    host_addr: node3:8080
    parser_config:
      type: CSV
    source_type: Generator
    source_config:
      generator_rate_type: FIXED
      generator_rate_config: emit_rate 10
      stop_generator_when_sequence_finishes: NONE
      seed: 1
      generator_schema: |
        NORMAL_DISTRIBUTION FLOAT64 0 1

workers:
  - host_addr: node1:8080
    data_addr: node1:9090
    max_operators: 10000

  - host_addr: node2:8080
    data_addr: node2:9090
    max_operators: 10000
    peers:
      - node1:8080

  - host_addr: node3:8080
    data_addr: node3:9090
    max_operators: 10000
    peers:
      - node2:8080
