# Topology:
#
#   ┌──────────────────────────────┐
#   │  worker-2  (cap: 10000)      │
#   │  S: GENERATOR_SOURCE         │
#   └──────────────┬───────────────┘
#                  │
#                  ▼
#   ┌──────────────────────────────┐
#   │  worker-1  (cap: 10000)      │
#   │  K: PRINT_SINK               │
#   └──────────────────────────────┘
#
#   worker-2 ─► worker-1
#   (backpressure via worker config: small queues)

query: |
  SELECT
    *
  FROM
    GENERATOR_SOURCE
  INTO
    PRINT_SINK
sinks:
  - name: print_sink
    host_addr: worker-1:8080
    schema:
      - name: DOUBLE
        type: FLOAT64
    sink_type: Print
    config:
      ingestion: 5000
      output_format: CSV
    parser_config: { }

logical_sources:
  - name: GENERATOR_SOURCE
    schema:
      - name: DOUBLE
        type: FLOAT64

physical_sources:
  - logical_source: GENERATOR_SOURCE
    host_addr: worker-2:8080
    parser_config:
      type: CSV
      fieldDelimiter: ","
    source_type: Generator
    source_config:
      generator_rate_type: FIXED
      generator_rate_config: emit_rate 100000
      stop_generator_when_sequence_finishes: NONE
      seed: 1
      generator_schema: |
        NORMAL_DISTRIBUTION FLOAT64 0 1

workers:
  - host_addr: worker-1:8080
    data_addr: worker-1:9090
    max_operators: 10000
    config:
      worker:
        number_of_buffers_in_global_buffer_manager: 128
        network:
          receiver_queue_size: 2
  - host_addr: worker-2:8080
    data_addr: worker-2:9090
    peers: [ worker-1:8080 ]
    max_operators: 10000
    config:
      worker:
        network:
          sender_queue_size: 2
          max_pending_acks: 2
