# Topology (star -- 9 workers):
#
#   ┌────────────────┐ ┌────────────────┐ ┌────────────────┐ ┌────────────────┐
#   │  worker-2      │ │  worker-3      │ │  worker-4      │ │  worker-5      │
#   │  S: stream     │ │  S: stream2    │ │  S: stream3    │ │  S: stream4    │
#   └───────┬────────┘ └───────┬────────┘ └───────┬────────┘ └───────┬────────┘
#           │                  │                  │                  │
#           └──────────┬───────┘                  │                  │
#                      └──────────────┬───────────┘                  │
#                                     └──────────────────┬───────────┘
#   ┌────────────────┐ ┌────────────────┐ ┌────────────────┐ ┌────────────────┐
#   │  worker-6      │ │  worker-7      │ │  worker-8      │ │  worker-9      │
#   │  S: stream5    │ │  S: stream6    │ │  S: stream7    │ │  S: stream8    │
#   └───────┬────────┘ └───────┬────────┘ └───────┬────────┘ └───────┬────────┘
#           │                  │                  │                  │
#           └──────────┬───────┘                  │                  │
#                      └──────────────┬───────────┘                  │
#                                     └──────────────────┬───────────┘
#                                                        │
#                                                        ▼
#                                          ┌──────────────────────────┐
#                                          │  worker-1  (cap: 10000)  │
#                                          │  K: sink (File)          │
#                                          │  K: VOID_SINK            │
#                                          └──────────────────────────┘
#
#   All source workers (2-9) ─► worker-1
#   8-way chained join; each source on a separate worker.

query: |
  SELECT start, end, id FROM (
    SELECT start as start6, end as end6, id, timestamp1, id2, timestamp2, id3, timestamp3, id4, timestamp4, id5, timestamp5, id6, timestamp6, id7, timestamp7 FROM (
      SELECT start as start5, end as end5, id, timestamp1, id2, timestamp2, id3, timestamp3, id4, timestamp4, id5, timestamp5, id6, timestamp6 FROM (
        SELECT start as start4, end as end4, id, timestamp1, id2, timestamp2, id3, timestamp3, id4, timestamp4, id5, timestamp5 FROM (
          SELECT start as start3, end as end3, id, timestamp1, id2, timestamp2, id3, timestamp3, id4, timestamp4 FROM (
            SELECT start as start2, end as end2, id, timestamp1, id2, timestamp2, id3, timestamp3 FROM (
              SELECT start as start1, end as end1, id, timestamp1, id2, timestamp2 FROM (
                SELECT * FROM (SELECT * FROM stream)
                INNER JOIN (SELECT * FROM stream2)
                ON id = id2
                WINDOW TUMBLING (timestamp1, timestamp2, size 1 sec)
              )
            )
            INNER JOIN (SELECT * FROM stream3)
            ON id2 = id3
            WINDOW TUMBLING (timestamp2, timestamp3, size 1 sec)
          )
          INNER JOIN (SELECT * FROM stream4)
          ON id3 = id4
          WINDOW TUMBLING (timestamp3, timestamp4, size 1 sec)
        )
        INNER JOIN (SELECT * FROM stream5)
        ON id4 = id5
        WINDOW TUMBLING (timestamp4, timestamp5, size 1 sec)
      )
      INNER JOIN (SELECT * FROM stream6)
      ON id5 = id6
      WINDOW TUMBLING (timestamp5, timestamp6, size 1 sec)
    )
    INNER JOIN (SELECT * FROM stream7)
    ON id6 = id7
    WINDOW TUMBLING (timestamp6, timestamp7, size 1 sec)
  )
  INNER JOIN (SELECT * FROM stream8)
  ON id7 = id8
  WINDOW TUMBLING (timestamp7, timestamp8, size 1 sec)
  INTO sink;
sinks:
  - name: sink
    host: worker-1:8080
    schema:
      - name: start
        type: UINT64
      - name: end
        type: UINT64
      - name: id
        type: UINT64
    type: File
    config:
      file_path: out.csv
      output_format: CSV
  - name: VOID_SINK
    host: worker-1:8080
    schema:
      - name: timestamp1
        type: UINT64
      - name: id
        type: UINT64
    type: Void

logical:
  - name: stream
    schema:
      - name: timestamp1
        type: UINT64
      - name: id
        type: UINT64
  - name: stream8
    schema:
      - name: timestamp8
        type: UINT64
      - name: id8
        type: UINT64
  - name: stream7
