[package]
name = "nebucli"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib", "lib"]

[[bin]]
name = "nebucli"
path = "src/main.rs"

[dependencies]
coordinator_bridge = { path = "../../nes-coordinator/bridge" }
model = { path = "../../nes-coordinator/model" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"
anyhow = "1.0"
tokio = { version = "1", features = ["time"] }
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = "0.3"
