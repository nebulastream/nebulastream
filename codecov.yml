# Patch (diff) coverage is advisory for this repository. Some code paths — notably the
# concurrency and error-handling edges of the buffer-exhaustion arbiter (the 5s safety
# backstop, the "no eligible victim" path, terminating a query that is mid-stop) — cannot
# be exercised deterministically by unit tests. Keep patch coverage reported but
# non-blocking so it does not gate merges; project coverage still applies.
coverage:
  status:
    patch:
      default:
        informational: true
