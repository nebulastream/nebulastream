# Top drinks — REAL-PI schema, NEW dashboard
#
# Feeds TopDrinks.jsx (topic: top-drinks).
#
# The machine reports NO drink names, but three MEANINGFUL, mutually-exclusive
# drink categories can be DERIVED from the counters with plain arithmetic, and
# they sum exactly to the total product count (absolute_counter):
#
#   blackCoffee   = brewcycles_left - milk_cycles_left   (a brew with no milk)
#   milkCoffee    = milk_cycles_left                      (a milk drink; in the
#                     data every milk drink is also a brew, i.e. milk ⊆ brews)
#   hotWaterOther = absolute_counter - brewcycles_left    (product that ran no
#                     brew cycle: hot water / milk-only)
#
# Verified on the 24-day capture (723 products): 399 black + 131 milk + 193 other
# = 723 = absolute_counter delta. So the three bars are a real, all-time drink mix
# — a genuine upgrade over the old passthrough, whose brewsRight was a DEAD field
# (single-brewer machine, always 0).
#
# ENGINE-SIDE: the subtractions are a plain NES map/projection (no window) —
# `field - field AS alias` is supported (nes-systests/operator/map/Map_Sub.test).
# Values are CUMULATIVE lifetime-since-reset counts; the "since page opened" delta,
# if wanted, is left to the UI (same pattern as the bean tiles). All-time counts
# are exactly what a "what does the office drink" mix wants, so no baseline here.
#
# NOTE: only field-field arithmetic is used — NES cannot reference a freshly
# created alias within the same SELECT (Map_Add.test:62), so each output is
# computed straight from wire fields.

query: |
  SELECT
    brewcycles_left - milk_cycles_left  AS `blackCoffee`,
    milk_cycles_left                    AS `milkCoffee`,
    absolute_counter - brewcycles_left  AS `hotWaterOther`
  FROM COFFEE_MACHINE
  INTO MQTT_SINK

sinks:
  - name: MQTT_SINK
    host: 127.0.0.1:9090
    type: MQTT
    config:
      serverURI: mqtt://host.docker.internal:1883
      clientId: mqtt_sink_top_drinks
      topic: top-drinks
      qos: 1
      output_format: JSON
    parser_config: {}
    schema:
      # Backticks REQUIRED (CLIStarter.cpp:76-96 uppercases unquoted names);
      # YAML quotes REQUIRED (` is a reserved YAML indicator).
      # INT32 - INT32 is INT32, so all three stay INT32.
      - name: "`blackCoffee`"
        type: INT32
      - name: "`milkCoffee`"
        type: INT32
      - name: "`hotWaterOther`"
        type: INT32

# 43 fields — matches the REAL Pi exactly (verified against raw rows read through
# the tunnel). Do NOT add machine_id: the real Pi does not send it, and any extra
# field shifts every subsequent column by one.
logical:
  - name: COFFEE_MACHINE
    schema:
      - name: ts_ms
        type: UINT64
      - name: total_water_quantity_ticks
        type: INT32
      - name: total_water_products_ticks
        type: INT32
      - name: total_water_rinse_ticks
        type: INT32
      - name: total_water_cleaning_ticks
        type: INT32
      - name: rfu
        type: INT32
      - name: total_coffee_bean_quantity_g
        type: INT32
      - name: total_coffee_beans_left_rear_g
        type: INT32
      - name: total_coffee_beans_right_front_g
        type: INT32
      - name: total_coffee_powder_chute_g
        type: INT32
      - name: cleaning_counter
        type: INT32
      - name: brewcycles_left
        type: INT32
      - name: brewcycles_right
        type: INT32
      - name: cycles_rinse_clean_left
        type: INT32
      - name: cycles_rinse_clean_right
        type: INT32
      - name: time_milk_cs
        type: INT32
      - name: heating_time_boiler_left_cs
        type: INT32
      - name: heating_time_boiler_right_cs
        type: INT32
      - name: time_hot_water_cs
        type: INT32
      - name: time_steam_left_cs
        type: INT32
      - name: time_steam_right_cs
        type: INT32
      - name: heat_time_steam_boiler_1_cs
        type: INT32
      - name: heat_time_steam_boiler_2_cs
        type: INT32
      - name: time_air_pump_cs
        type: INT32
      - name: milk_cycles_left
        type: INT32
      - name: milk_cycles_right
        type: INT32
      - name: reset_date_day
        type: INT32
      - name: reset_date_month
        type: INT32
      - name: reset_date_year
        type: INT32
      - name: rfu2
        type: INT32
      - name: reset_time_second
        type: INT32
      - name: reset_time_minute
        type: INT32
      - name: reset_time_hour
        type: INT32
      - name: rfu3
        type: INT32
      - name: time_milk_steam_left_cs
        type: INT32
      - name: time_milk_steam_right_cs
        type: INT32
      - name: total_coffee_beans_grinder_adjustment_g
        type: INT32
      - name: absolute_counter
        type: INT32
      - name: time_powder_cs
        type: INT32
      - name: total_powder_quantity_left_g
        type: INT32
      - name: total_powder_quantity_right_g
        type: INT32
      - name: total_coffee_beans_3_g
        type: INT32
      - name: total_coffee_beans_4_g
        type: INT32

# NES TCP source = TCP CLIENT. The worker DIALS OUT to socket_host:socket_port.
# All config keys are snake_case (verified in nes-plugins/Sources/TCPSource/
# TCPSource.hpp). socket_domain (AF_INET) and socket_type (SOCK_STREAM) are the
# defaults, so they can be omitted.
#
# tuple_delimiter is typed `char` (TCPSource.hpp:121-123), so "\r\n" is NOT
# expressible even though the Pi terminates rows with CRLF. With "\n" the
# trailing \r lands on the LAST field only (total_coffee_beans_4_g), which this
# query does not select — harmless here, but a trap for any query that does.
physical:
  # Real Pi, reached via the SSH tunnel on the Mac (see ../PI-TUNNEL-SETUP.md)
  - logical: COFFEE_MACHINE
    host: 127.0.0.1:9090
    type: TCP
    parser_config:
      type: CSV
      tuple_delimiter: "\n"
      field_delimiter: ","
    source_config:
      socket_host: host.docker.internal
      socket_port: 2222
      socket_buffer_size: 65536   # read buffer in BYTES
      flush_interval_ms: 100
      connect_timeout_seconds: 86400 # the Pi can be slow/closed; wait rather than fail fast

workers:
  - host: 127.0.0.1:9090
    grpc: 127.0.0.1:8080
    capacity: 10000
