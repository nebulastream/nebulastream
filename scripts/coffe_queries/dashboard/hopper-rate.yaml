# Hopper consumption RATE per hopper — REAL-PI schema, NEW dashboard
#
# Feeds HopperQuantity.jsx (topic: hopper-rate).
#
# ENGINE-SIDE RATE (this is the point of the demo): grams consumed per hopper
# within each tumbling time window = MAX(cumulative) - MIN(cumulative) over the
# window. The old hopper-quantity.yaml was a byte-identical passthrough of
# bean-consumption; this replaces that idea with a genuine NES-computed rate.
# The UI plots each window's emission as a rolling line, so the tile shows
# "grams per window since the page was reloaded".
#
# Runs ALONGSIDE the older passthrough queries (distinct topic + clientId).
#
# ---------------------------------------------------------------------------
# TIMESTAMP FIX (do not remove): the Pi's ts_ms is epoch *SECONDS*, but NES reads
# window timestamps as *milliseconds*. Feeding ts_ms straight into WINDOW makes
# "SIZE 30 SEC" actually span 30000 s (~8.3 h). The inner subquery multiplies
# ts_ms * UINT64(1000) so the window size means real wall-clock time. Constants
# MUST be cast (UINT64(1000)) or the parser errors (untyped literal -> ERROR 2000).
# NOTE: the older scripts/coffe_queries/tcp/beans.yaml omits this fix and is wrong.
#
# WINDOW SIZE is a demo knob. SIZE 30 SEC gives lively movement against the
# calibrated simulator (coffe-server-pi-schema.py). The REAL machine is slow
# (5-80 drinks/day, 89% of rows have no product), so on the real Pi most 30 s
# windows read 0 g — bump to SIZE 5 MINUTES (or more) there. Units are the tokens
# MS / SEC / MINUTES / HOURS / DAY (NOT "MIN" — that token is the MIN aggregation
# function). Keywords are case-insensitive.
#
# KNOWN EDGE — counter resets: MAX - MIN over a window that spans a machine
# counter reset is wrong (it reports the pre-reset lifetime, or goes negative).
# Resets are rare (14 in a 24-day capture) and CANNOT be filtered out, because the
# post-reset values are genuine (a WHERE guard only removes all-zero dropout rows,
# e.g. `WHERE total_coffee_beans_left_rear_g > INT32(0)`). Acceptable for the demo.
#
# PAYLOAD: only the four per-window rate values are published (no start/end); the
# browser timestamps each message on arrival. To carry real window boundaries
# instead, add `start, end` to the SELECT and two leading UINT64 entries to the
# sink schema below (verify the emitted JSON key names first).

query: |
  SELECT
    MAX(hopper_lr) - MIN(hopper_lr) AS `leftRear`,
    MAX(hopper_rf) - MIN(hopper_rf) AS `rightFront`,
    MAX(hopper_3)  - MIN(hopper_3)  AS `hopper3`,
    MAX(hopper_4)  - MIN(hopper_4)  AS `hopper4`
  FROM (
    SELECT
      ts_ms * UINT64(1000)             AS ts_millis,
      total_coffee_beans_left_rear_g   AS hopper_lr,
      total_coffee_beans_right_front_g AS hopper_rf,
      total_coffee_beans_3_g           AS hopper_3,
      total_coffee_beans_4_g           AS hopper_4
    FROM COFFEE_MACHINE
  )
  WINDOW TUMBLING(ts_millis, SIZE 30 SEC)
  INTO MQTT_SINK

sinks:
  - name: MQTT_SINK
    host: 127.0.0.1:9090
    type: MQTT
    config:
      serverURI: mqtt://host.docker.internal:1883
      clientId: mqtt_sink_hopper_rate
      topic: hopper-rate
      qos: 1
      output_format: JSON
    parser_config: {}
    schema:
      # Backticks REQUIRED (CLIStarter.cpp:76-96 uppercases unquoted names);
      # YAML quotes REQUIRED (` is a reserved YAML indicator).
      # MAX(INT32) - MIN(INT32) is INT32, so INT32 is correct here.
      - name: "`leftRear`"
        type: INT32
      - name: "`rightFront`"
        type: INT32
      - name: "`hopper3`"
        type: INT32
      - name: "`hopper4`"
        type: INT32

# 43 fields — matches the REAL Pi exactly (verified against raw rows read through
# the tunnel). Do NOT add machine_id: the real Pi does not send it, and any extra
# field shifts every subsequent column by one.
logical:
  - name: COFFEE_MACHINE
    schema:
      - name: ts_ms
        type: UINT64
      - name: total_water_quantity_ticks
        type: INT32
      - name: total_water_products_ticks
        type: INT32
      - name: total_water_rinse_ticks
        type: INT32
      - name: total_water_cleaning_ticks
        type: INT32
      - name: rfu
        type: INT32
      - name: total_coffee_bean_quantity_g
        type: INT32
      - name: total_coffee_beans_left_rear_g
        type: INT32
      - name: total_coffee_beans_right_front_g
        type: INT32
      - name: total_coffee_powder_chute_g
        type: INT32
      - name: cleaning_counter
        type: INT32
      - name: brewcycles_left
        type: INT32
      - name: brewcycles_right
        type: INT32
      - name: cycles_rinse_clean_left
        type: INT32
      - name: cycles_rinse_clean_right
        type: INT32
      - name: time_milk_cs
        type: INT32
      - name: heating_time_boiler_left_cs
        type: INT32
      - name: heating_time_boiler_right_cs
        type: INT32
      - name: time_hot_water_cs
        type: INT32
      - name: time_steam_left_cs
        type: INT32
      - name: time_steam_right_cs
        type: INT32
      - name: heat_time_steam_boiler_1_cs
        type: INT32
      - name: heat_time_steam_boiler_2_cs
        type: INT32
      - name: time_air_pump_cs
        type: INT32
      - name: milk_cycles_left
        type: INT32
      - name: milk_cycles_right
        type: INT32
      - name: reset_date_day
        type: INT32
      - name: reset_date_month
        type: INT32
      - name: reset_date_year
        type: INT32
      - name: rfu2
        type: INT32
      - name: reset_time_second
        type: INT32
      - name: reset_time_minute
        type: INT32
      - name: reset_time_hour
        type: INT32
      - name: rfu3
        type: INT32
      - name: time_milk_steam_left_cs
        type: INT32
      - name: time_milk_steam_right_cs
        type: INT32
      - name: total_coffee_beans_grinder_adjustment_g
        type: INT32
      - name: absolute_counter
        type: INT32
      - name: time_powder_cs
        type: INT32
      - name: total_powder_quantity_left_g
        type: INT32
      - name: total_powder_quantity_right_g
        type: INT32
      - name: total_coffee_beans_3_g
        type: INT32
      - name: total_coffee_beans_4_g
        type: INT32

# NES TCP source = TCP CLIENT. The worker DIALS OUT to socket_host:socket_port.
# All config keys are snake_case (verified in nes-plugins/Sources/TCPSource/
# TCPSource.hpp). socket_domain (AF_INET) and socket_type (SOCK_STREAM) are the
# defaults, so they can be omitted.
#
# tuple_delimiter is typed `char` (TCPSource.hpp:121-123), so "\r\n" is NOT
# expressible even though the Pi terminates rows with CRLF. With "\n" the trailing
# \r lands on the LAST field only (total_coffee_beans_4_g / hopper_4). It is used
# in MAX/MIN here and is fine: the \r is ignored for integer columns (from_chars
# parses the leading digits — see bean-consumption.yaml header).
physical:
  # Real Pi, reached via the SSH tunnel on the Mac (see ../PI-TUNNEL-SETUP.md)
  - logical: COFFEE_MACHINE
    host: 127.0.0.1:9090
    type: TCP
    parser_config:
      type: CSV
      tuple_delimiter: "\n"
      field_delimiter: ","
    source_config:
      socket_host: host.docker.internal
      socket_port: 2222
      socket_buffer_size: 65536   # read buffer in BYTES
      flush_interval_ms: 100
      connect_timeout_seconds: 86400 # the Pi can be slow/closed; wait rather than fail fast

workers:
  - host: 127.0.0.1:9090
    grpc: 127.0.0.1:8080
    capacity: 10000
