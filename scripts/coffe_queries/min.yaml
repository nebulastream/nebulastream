query: |
  SELECT
    `COFFE_MACHINE$MACHINEID` AS id
  FROM COFFE_MACHINE
  INTO MQTT_SINK

sinks:
  - name: MQTT_SINK
    host: 127.0.0.1:9090
    type: MQTT
    config:
      serverURI: mqtt://127.0.0.1:1883
      clientId: mqtt_sink_client
      topic: coffee/test
      qos: 1
      output_format: JSON
    parser_config: { }
    schema:
      - name: id
        type: INT32

logical:
  - name: COFFE_MACHINE
    schema:
      - name: machineId
        type: INT32

physical:
  - logical: COFFE_MACHINE
    host: 127.0.0.1:9090
    type: RestApi
    parser_config:
      type: JSON
    source_config:
      endpoint: http://127.0.0.1:8000/v3/machines/machine-counters/101
      interval_ms: 1000
      connect_timeout_seconds: 60
      append_newline: true

workers:
  - host: 127.0.0.1:9090
    grpc: 127.0.0.1:8080
    capacity: 10000