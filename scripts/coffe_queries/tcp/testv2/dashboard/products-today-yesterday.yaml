# Products today vs yesterday — REAL Pi TCP source, NEW dashboard
#
# Feeds TodayVsYesterday.jsx (topic: products-today-yesterday). That component
# reads a flat message {productsToday, productsYesterday} and DROPS the message
# unless BOTH fields are present (TodayVsYesterday.jsx:54-60), so both must come
# from one row / one query.
#
# PASSTHROUGH — no WINDOW, no aggregation. Publishes raw cumulative counters
# straight from each incoming row (same proven shape as beans-ricardo-water.yaml).
# Two consequences, both deliberate:
#   * The tile always shows real non-zero values, even while the machine is idle
#     (windowed MAX-MIN deltas would read 0 on an idle machine).
#   * Nothing reads ts_ms, which sidesteps a real trap: the Pi's first field is
#     epoch SECONDS, but NES always interprets a window timestamp as MILLISECONDS
#     (TimeCharacteristic.cpp:41 defaults to TimeUnit(1); the SQL grammar's
#     `timestampParameter` accepts no unit). A windowed query here would need
#     ~2.8h of data per "10 SEC" window.
#
# RELABEL — read this before trusting the numbers:
#   productsToday     <- absolute_counter (lifetime product count, e.g. 2622)
#   productsYesterday <- brewcycles_left  (lifetime left-group brews, e.g. 1957)
# There is NO real "yesterday" figure available: this is a live-only stream and
# NES has no cross-window/historical lookup, so a true prior-period delta cannot
# be computed. Rather than fabricate a constant, the tile shows two DIFFERENT
# REAL counters so both bars are live and visibly distinct. The "Yesterday" label
# is therefore cosmetic, not literal — see README.md.
#
# NOTE: SELECT aliases MUST be backtick-quoted to preserve camelCase — unquoted
# identifiers are uppercased by the parser (nes-sql-parser/src/
# CommonParserFunctions.cpp:45-51), and the dashboard reads exact camelCase.

query: |
  SELECT
    absolute_counter AS `productsToday`,
    brewcycles_left  AS `productsYesterday`
  FROM COFFEE_MACHINE
  INTO MQTT_SINK

sinks:
  - name: MQTT_SINK
    host: 127.0.0.1:9090
    type: MQTT
    config:
      # Worker runs in the devcontainer; mosquitto runs native on the Mac host.
      # host.docker.internal = the Mac host, as seen from inside the container.
      serverURI: mqtt://host.docker.internal:1883
      clientId: mqtt_sink_products_today_yesterday
      topic: products-today-yesterday
      qos: 1
      output_format: JSON
    parser_config: {}
    schema:
      # Backticks are REQUIRED here too, not just on the SQL aliases:
      # bindIdentifierName (nes-frontend/apps/cli/CLIStarter.cpp:76-96) strips
      # backticks and keeps case, but UPPERCASES anything unquoted. Without them
      # the sink declares PRODUCTSTODAY while the backticked query alias produces
      # productsToday -> "cannot infer schema" (error 2003).
      # The YAML quotes are also required: ` is a reserved YAML indicator and
      # cannot start a plain scalar.
      - name: "`productsToday`"
        type: INT32
      - name: "`productsYesterday`"
        type: INT32

# 43 fields — matches the REAL Pi exactly (verified against raw rows read through
# the tunnel). Do NOT add machine_id: the real Pi does not send it, and any extra
# field shifts every subsequent column by one.
logical:
  - name: COFFEE_MACHINE
    schema:
      - name: ts_ms
        type: UINT64
      - name: total_water_quantity_ticks
        type: INT32
      - name: total_water_products_ticks
        type: INT32
      - name: total_water_rinse_ticks
        type: INT32
      - name: total_water_cleaning_ticks
        type: INT32
      - name: rfu
        type: INT32
      - name: total_coffee_bean_quantity_g
        type: INT32
      - name: total_coffee_beans_left_rear_g
        type: INT32
      - name: total_coffee_beans_right_front_g
        type: INT32
      - name: total_coffee_powder_chute_g
        type: INT32
      - name: cleaning_counter
        type: INT32
      - name: brewcycles_left
        type: INT32
      - name: brewcycles_right
        type: INT32
      - name: cycles_rinse_clean_left
        type: INT32
      - name: cycles_rinse_clean_right
        type: INT32
      - name: time_milk_cs
        type: INT32
      - name: heating_time_boiler_left_cs
        type: INT32
      - name: heating_time_boiler_right_cs
        type: INT32
      - name: time_hot_water_cs
        type: INT32
      - name: time_steam_left_cs
        type: INT32
      - name: time_steam_right_cs
        type: INT32
      - name: heat_time_steam_boiler_1_cs
        type: INT32
      - name: heat_time_steam_boiler_2_cs
        type: INT32
      - name: time_air_pump_cs
        type: INT32
      - name: milk_cycles_left
        type: INT32
      - name: milk_cycles_right
        type: INT32
      - name: reset_date_day
        type: INT32
      - name: reset_date_month
        type: INT32
      - name: reset_date_year
        type: INT32
      - name: rfu2
        type: INT32
      - name: reset_time_second
        type: INT32
      - name: reset_time_minute
        type: INT32
      - name: reset_time_hour
        type: INT32
      - name: rfu3
        type: INT32
      - name: time_milk_steam_left_cs
        type: INT32
      - name: time_milk_steam_right_cs
