# NES TCP source = TCP CLIENT. The worker DIALS OUT to socket_host:socket_port,
# so socket_host must be the address of the Raspberry Pi (the listening server).
#
# All config keys are snake_case (verified in nes-plugins/Sources/TCPSource/
# TCPSource.hpp). camelCase keys are silently ignored. socket_domain (AF_INET)
# and socket_type (SOCK_STREAM) are the defaults, so they can be omitted.
physical:
  # Machine 101 — Pi listening on port 2222
  - logical: COFFEE_MACHINE
    host: 127.0.0.1:9090
    type: TCP
    parser_config:
      type: CSV
      tuple_delimiter: "\n"
      field_delimiter: ","
    source_config:
      # Currently pointed at the local mock server (scripts/coffe-server.py) for
      # end-to-end testing without the real Pi. Tomorrow: an SSH tunnel from the
      # jump host will listen on this same Mac-local port, so this value likely
      # stays host.docker.internal — only re-check the port if the tunnel uses
      # a different one than the mock.
      socket_host: host.docker.internal
      socket_port: 2222
      socket_buffer_size: 65536   # read buffer in BYTES
      flush_interval_ms: 100
      connect_timeout_seconds: 10 # seconds to wait for connect before failing

# To add more machines, copy the physical entry above and change socket_port
# (and socket_host if each is a separate Pi).

workers:
  - host: 127.0.0.1:9090
    grpc: 127.0.0.1:8080
    capacity: 10000