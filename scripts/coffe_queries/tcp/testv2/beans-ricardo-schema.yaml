# Bean consumption query — TCP source, MachineCounters schema
#
# Computes per-hopper bean consumption over 10-second tumbling windows.
# MAX - MIN of cumulative gram counters within the window = beans consumed.
#
# Schema: all INT32 (or UINT64 for ts_ms). No VARSIZED, no mixed types.
# One logical source, three physical TCP sources (one per machine/port).

query: |
  SELECT
    MAX(hopper_left_rear)  - MIN(hopper_left_rear)  AS HOPPER_LEFT_REAR,
    MAX(hopper_right_front) - MIN(hopper_right_front) AS HOPPER_RIGHT_FRONT,
    MAX(hopper_3)          - MIN(hopper_3)          AS HOPPER_3,
    MAX(hopper_4)          - MIN(hopper_4)          AS HOPPER_4
  FROM (
    SELECT
      ts_ms,
      total_coffee_beans_left_rear_g  AS hopper_left_rear,
      total_coffee_beans_right_front_g AS hopper_right_front,
      total_coffee_beans_3_g          AS hopper_3,
      total_coffee_beans_4_g          AS hopper_4
    FROM COFFEE_MACHINE
  )
  WINDOW TUMBLING(ts_ms, SIZE 10 SEC)
  INTO MQTT_SINK

sinks:
  - name: MQTT_SINK
    host: 127.0.0.1:9090
    type: MQTT
    config:
      # Worker runs in the devcontainer; mosquitto runs native on the Mac host.
      # host.docker.internal = the Mac host, as seen from inside the container.
      serverURI: mqtt://host.docker.internal:1883
      clientId: mqtt_sink_bean_consumption
      topic: bean-consumption
      qos: 1
      output_format: JSON
    parser_config: {}
    schema:
      - name: HOPPER_LEFT_REAR
        type: INT32
      - name: HOPPER_RIGHT_FRONT
        type: INT32
      - name: HOPPER_3
        type: INT32
      - name: HOPPER_4
        type: INT32

logical:
  - name: COFFEE_MACHINE
    schema:
      - name: ts_ms
        type: UINT64
      - name: total_water_quantity_ticks
        type: INT32
      - name: total_water_products_ticks
        type: INT32
      - name: total_water_rinse_ticks
        type: INT32
      - name: total_water_cleaning_ticks
        type: INT32
      - name: rfu
        type: INT32
      - name: total_coffee_bean_quantity_g
        type: INT32
      - name: total_coffee_beans_left_rear_g
        type: INT32
      - name: total_coffee_beans_right_front_g
        type: INT32
      - name: total_coffee_powder_chute_g
        type: INT32
      - name: cleaning_counter
        type: INT32
      - name: brewcycles_left
        type: INT32
      - name: brewcycles_right
        type: INT32
      - name: cycles_rinse_clean_left
        type: INT32
      - name: cycles_rinse_clean_right
        type: INT32
      - name: time_milk_cs
        type: INT32
      - name: heating_time_boiler_left_cs
        type: INT32
      - name: heating_time_boiler_right_cs
        type: INT32
      - name: time_hot_water_cs
        type: INT32
      - name: time_steam_left_cs
        type: INT32
      - name: time_steam_right_cs
        type: INT32
      - name: heat_time_steam_boiler_1_cs
        type: INT32
      - name: heat_time_steam_boiler_2_cs
        type: INT32
      - name: time_air_pump_cs
        type: INT32
      - name: milk_cycles_left
        type: INT32
      - name: milk_cycles_right
        type: INT32
      - name: reset_date_day
