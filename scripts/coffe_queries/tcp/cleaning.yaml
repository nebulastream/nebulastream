# Cleaning vs Use — TCP source, MachineCounters schema
#
# Emits both absolute_counter (shots) and cleaning_counter per 10s tumbling
# window. MAX is used because these are monotonically increasing totals —
# the frontend plots the raw cumulative values as a time series.
#
# Replaces three old queries (cleaning-use-bar, cleaning-use-line, cleaning)
# with one unified query on a single topic consumed by CleaningVsUse.jsx.

query: |
  SELECT
    SHOTS AS SHOTS,
    CLEANINGS AS CLEANINGS
  FROM (
    SELECT
      MAX(absolute_counter) AS SHOTS,
      MAX(cleaning_counter) AS CLEANINGS
    FROM COFFEE_MACHINE
    WINDOW TUMBLING(ts_ms, SIZE 10 SEC)
  )
  INTO MQTT_SINK

sinks:
  - name: MQTT_SINK
    host: 127.0.0.1:9090
    type: MQTT
    config:
      serverURI: mqtt://127.0.0.1:1883
      clientId: mqtt_sink_cleaning_vs_use
      topic: cleaning-vs-use
      qos: 1
      output_format: JSON
    parser_config: {}
    schema:
      - name: SHOTS
        type: INT32
      - name: CLEANINGS
        type: INT32

logical:
  - name: COFFEE_MACHINE
    schema:
      - name: machine_id
