# Water usage query — TCP source, MachineCounters schema
#
# Computes water consumption per category over 10-second tumbling windows.
# MAX - MIN of cumulative tick counters within the window = ticks consumed.
#
# Tick → litre conversion depends on flow-meter calibration (~0.5 ml/tick),
# but that conversion is left to the frontend so NES emits raw tick deltas.
#
# Note: the original schema had a PURGEQUANTITY field which does not exist
# in the MachineCounters protocol. It is emitted as INT32(0) constant.
#
# Logical source and physical sources are identical to beans.yaml —
# if NES supports source reuse across queries this block can be shared.

query: |
  SELECT
    MAX(products_ticks)  - MIN(products_ticks)  AS PRODUCTSQUANTITY,
    MAX(rinse_ticks)     - MIN(rinse_ticks)     AS RINSEQUANTITY,
    INT32(0)                                    AS PURGEQUANTITY,
    MAX(cleaning_ticks)  - MIN(cleaning_ticks)  AS CLEANINGQUANTITY,
    MAX(total_ticks)     - MIN(total_ticks)     AS TOTALQUANTITY
  FROM (
    SELECT
      ts_ms,
      total_water_products_ticks  AS products_ticks,
      total_water_rinse_ticks     AS rinse_ticks,
      total_water_cleaning_ticks  AS cleaning_ticks,
      total_water_quantity_ticks  AS total_ticks
    FROM COFFEE_MACHINE
  )
  WINDOW TUMBLING(ts_ms, SIZE 10 SEC)
  INTO MQTT_SINK

sinks:
  - name: MQTT_SINK
    host: 127.0.0.1:9090
    type: MQTT
    config:
      serverURI: mqtt://127.0.0.1:1883
      clientId: mqtt_sink_water_usage
      topic: water-usage
      qos: 1
      output_format: JSON
    parser_config: {}
    schema:
      - name: PRODUCTSQUANTITY
        type: INT32
      - name: RINSEQUANTITY
        type: INT32
      - name: PURGEQUANTITY
        type: INT32
      - name: CLEANINGQUANTITY
        type: INT32
      - name: TOTALQUANTITY
        type: INT32

