physical:
  # Machine 101 — port 9101
  - logical: COFFEE_MACHINE
    host: 127.0.0.1:9090
    type: TCP
    parser_config:
      type: CSV
      tuple_delimiter: "\n"
      field_delimiter: ","
    source_config:
      socket_host: 127.0.0.1
      socket_port: 9101
      socket_buffer_size: 65536
      flush_interval_ms: 100
      connect_timeout_seconds: 60

