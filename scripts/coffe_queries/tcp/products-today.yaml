# Products today vs yesterday — TCP source, MachineCounters schema
#
# Derives rolling product counts from per-machine absolute_counter snapshots.
#
# Because absolute_counter is a monotonically increasing lifetime total,
# MAX - MIN within a time window gives products made in that window.
#
# Time periods (rolling, not calendar-aligned):
#   today         → last 24 hours   (SLIDING, SIZE 24 HOURS, ADVANCE BY 1 MIN)
#   yesterday     → 24–48 hours ago → not directly expressible in NES windows;
#                   approximated as last 48h minus last 24h via two queries —
#                   here we use a 48h window and subtract the 24h window result,
#                   but since NES doesn't support query subtraction directly we
#                   emit both the 24h and 48h deltas and let the frontend derive
#                   yesterday = thisWeek_48h - today_24h if needed.
#                   Simplest practical approach: emit 4 sliding windows of
#                   different sizes and label them accordingly.
#
# All three machines feed the same logical source (union via multiple physical
# sources), so the aggregation is across the whole group automatically.

query: |
  SELECT
    MAX(absolute_counter) - MIN(absolute_counter) AS totalProductsToday
  FROM COFFEE_MACHINE
  WINDOW SLIDING(ts_ms, SIZE 86400 SEC, ADVANCE BY 60 SEC)
  INTO MQTT_SINK_TODAY

sinks:
  - name: MQTT_SINK_TODAY
    host: 127.0.0.1:9090
    type: MQTT
    config:
      serverURI: mqtt://127.0.0.1:1883
      clientId: mqtt_sink_products_today
      topic: products-today-yesterday
      qos: 1
      output_format: JSON
    parser_config: {}
    schema:
      - name: totalProductsToday
        type: INT32

