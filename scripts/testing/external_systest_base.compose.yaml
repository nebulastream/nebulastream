# Base compose for external_systest. Merged with a plugin-supplied
# compose.snippet.yaml at test time (`docker compose -f base -f snippet up`).
# The snippet adds the external dependency services (broker, db, ...) and
# can extend services.systest.depends_on to gate the systest container on
# their healthchecks.
#
# Env vars expanded by docker compose at up-time (exported by
# nes_external_systest_setup_file): SYSTEST_IMAGE, CONTAINER_WORKDIR,
# TESTCONFIG_VOLUME, TEST_VOLUME, PROFILE_VOLUME, NES_DIR, PROFILE_GROUP.

services:
  systest:
    image: ${SYSTEST_IMAGE}
    pull_policy: never
    stop_grace_period: 0s
    command: ["sleep", "infinity"]
    working_dir: ${CONTAINER_WORKDIR}
    volumes:
      # Reconstruct $NES_DIR/nes-systests inside the container so the
      # systest binary's hardcoded discovery dir resolves.
      - ${TESTCONFIG_VOLUME}:${NES_DIR}
      - ${TEST_VOLUME}:${CONTAINER_WORKDIR}
      # Plugin's profile dir (configs, seed data) mounted read-only.
      - ${PROFILE_VOLUME}:/profile:ro

networks:
  default:
    labels:
      nes-test: external-systest-${PROFILE_GROUP}

volumes:
  ${TESTCONFIG_VOLUME}:
    external: true
  ${TEST_VOLUME}:
    external: true
  ${PROFILE_VOLUME}:
    external: true
