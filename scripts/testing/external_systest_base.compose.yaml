# Base compose for external_systest. Merged with a plugin-supplied
# compose.snippet.yaml at test time (`docker compose -f base -f snippet up`).
# The snippet adds the external dependency services (broker, db, ...) and
# can extend services.systest.depends_on to gate the systest container on
# their healthchecks.
#
# Env vars expanded by docker compose at up-time (exported by
# nes_external_systest_setup_file): SYSTEST_IMAGE, CONTAINER_WORKDIR,
# TESTCONFIG_VOLUME, TEST_VOLUME, PROFILE_VOLUME, NES_DIR, PROFILE_NAME.

services:
  systest:
    image: ${SYSTEST_IMAGE}
    pull_policy: never
    stop_grace_period: 0s
    command: ["sleep", "infinity"]
    working_dir: ${CONTAINER_WORKDIR}
    volumes:
      # Reconstruct $NES_DIR inside the container so the systest binary's
      # hardcoded discovery dir + the absolute --testLocation path both
      # resolve. The volume only contains the subtrees the bats runner
      # staged (nes-systests/* and the plugin's systests/ dir).
      - testconfig:${NES_DIR}
      - test:${CONTAINER_WORKDIR}
      # Plugin's profile dir (configs, seed data) mounted read-only.
      - profile:/profile:ro

networks:
  default:
    labels:
      nes-test: external-systest-${PROFILE_NAME}

# Stable logical names (compose validates `volumes:` keys against a schema
# before env substitution, so `${VAR}` as a key would fail). The `name:`
# field binds each logical name to the external (pre-created) volume.
volumes:
  testconfig:
    external: true
    name: ${TESTCONFIG_VOLUME}
  test:
    external: true
    name: ${TEST_VOLUME}
  profile:
    external: true
    name: ${PROFILE_VOLUME}
