query: |
  SELECT
    TIMESTAMP,
    WIDTH,
    HEIGHT,
    PIXEL_FORMAT,
    TO_BASE64(IMAGE) AS IMAGE
  FROM video
  INTO video_frames;

sinks:
  - name: video_frames
    host: localhost:8080
    schema:
      - name: TIMESTAMP
        type: UINT64
      - name: WIDTH
        type: UINT64
      - name: HEIGHT
        type: UINT64
      - name: PIXEL_FORMAT
        type: UINT64
      - name: IMAGE
        type: VARSIZED
    type: File
    config:
      output_format: CSV
      file_path: video-frames.csv
      append: false

logical:
  - name: video
    schema:
      - name: TIMESTAMP
        type: UINT64
      - name: WIDTH
        type: UINT64
      - name: HEIGHT
        type: UINT64
      - name: PIXEL_FORMAT
        type: UINT64
      - name: IMAGE
        type: VARSIZED

physical:
  - logical: video
    host: localhost:8080
    type: Video
    parser_config:
      type: Native
    source_config:
      sourceSelector: 2

workers:
  - host: localhost:8080
    data_address: localhost:9090
