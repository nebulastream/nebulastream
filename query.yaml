query:
  - name: video_stream
    query: |
      SELECT
        TIMESTAMP / UINT64(1000000) as TIMESTAMP,
        WIDTH,
        HEIGHT,
        PIXEL_FORMAT,
        IMAGE
      FROM video
      INTO video_pipe_sink;
  - name: rgb_jpg_stream
    query: |
      SELECT timestamp, width, height, pixel_format, to_base64(image_manip_yuyv_to_jpg(IMAGE, WIDTH, HEIGHT)) as image
      FROM video_pipe 
      WHERE PIXEL_FORMAT = 34603058
      INTO rgb_video_pipe_sink;
  - name: thermal_jpg_stream
    query: |
      SELECT timestamp, width, height, pixel_format, to_base64(image_manip_mono16_to_jpg(IMAGE, WIDTH, HEIGHT)) as image
      FROM video_pipe 
      WHERE PIXEL_FORMAT = 17825799
      INTO thermal_video_pipe_sink;
  - name: rgb_jpg_stream_mqtt
    query: |
      SELECT timestamp as "timestamp", image as "image"
      FROM rgb_video_pipe
      INTO rgb_mqtt
  - name: thermal_jpg_stream_mqtt
    query: |
      SELECT timestamp as "timestamp", image as "image"
      FROM thermal_video_pipe
      INTO thermal_mqtt
  - name: rgb_face_jpg_stream_mqtt
    query: |
      SELECT to_base64(image_manip_yuyv_to_jpg(image_manip_draw_rectangle(image, face), width, height)) as "image", timestamp as "timestamp"
      FROM (
        SELECT image, timestamp, height, width, image_manip_face_detection(image, width, height) as face
        FROM video_pipe
        WHERE PIXEL_FORMAT = 34603058
      )
      WHERE face IS NOT NULL
      INTO rgb_face_mqtt
  - name: audio_mqtt
    query: |
      SELECT sample as "sample"
      FROM microphone
      INTO audio_mqtt
sinks:
  - name: thermal_mqtt
    host: localhost:8080
    schema:
      - name: '"timestamp"'
        type: UINT64
      - name: '"image"'
        type: VARSIZED
    type: MQTT
    config:
      output_format: JSON
      server_uri: localhost:1883
      topic: thermal-image
      qos: 2
  - name: rgb_mqtt
    host: localhost:8080
    schema:
      - name: '"timestamp"'
        type: UINT64
      - name: '"image"'
        type: VARSIZED
    type: MQTT
    config:
      output_format: JSON
      server_uri: localhost:1883
      topic: rgb-image
      qos: 2
  - name: audio_mqtt
    host: localhost:8080
    schema:
      - name: '"sample"'
        type: FLOAT64
    type: MQTT
    config:
      output_format: CSV
      server_uri: localhost:1883
      topic: audio
      qos: 0
  - name: rgb_face_mqtt
    host: localhost:8080
    schema:
      - name: '"timestamp"'
        type: UINT64
      - name: '"image"'
        type: VARSIZED
    type: MQTT
    config:
      output_format: JSON
      server_uri: localhost:1883
      topic: rgb-face-image
      qos: 2
  - name: thermal_video_pipe_sink
    host: localhost:8080
    schema:
      - name: TIMESTAMP
        type: UINT64
        nullable: false
      - name: WIDTH
        type: UINT64
        nullable: false
      - name: HEIGHT
        type: UINT64
        nullable: false
      - name: PIXEL_FORMAT
        type: UINT64
        nullable: false
      - name: IMAGE
        type: VARSIZED
        nullable: false
    type: Pipe
    config:
      pipe_name: thermal_video_frames
  - name: rgb_video_pipe_sink
    host: localhost:8080
    schema:
      - name: TIMESTAMP
        type: UINT64
        nullable: false
      - name: WIDTH
        type: UINT64
        nullable: false
      - name: HEIGHT
        type: UINT64
        nullable: false
      - name: PIXEL_FORMAT
        type: UINT64
        nullable: false
      - name: IMAGE
        type: VARSIZED
        nullable: false
    type: Pipe
    config:
      pipe_name: rgb_video_frames
  - name: video_pipe_sink
    host: localhost:8080
    schema:
      - name: TIMESTAMP
        type: UINT64
        nullable: false
      - name: WIDTH
        type: UINT64
        nullable: false
      - name: HEIGHT
        type: UINT64
        nullable: false
      - name: PIXEL_FORMAT
        type: UINT64
        nullable: false
      - name: IMAGE
        type: VARSIZED
        nullable: false
    type: Pipe
    config:
      pipe_name: video_frames
  - name: video_frames
    host: localhost:8080
    schema:
      - name: TIMESTAMP
        type: UINT64
        nullable: false
      - name: WIDTH
        type: UINT64
        nullable: false
      - name: HEIGHT
        type: UINT64
        nullable: false
      - name: PIXEL_FORMAT
        type: UINT64
        nullable: false
      - name: IMAGE
        type: VARSIZED
        nullable: false
    type: File
    config:
      output_format: CSV
      file_path: video-frames.csv
      append: false

