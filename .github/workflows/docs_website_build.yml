name: Build Documentation Website
description: |
  Builds the NebulaStream documentation website (docs/website), skipping entirely if no
  files under docs/website/** changed. Called with should_publish: false to validate the
  build, should_publish: true to also publish it.

on:
  workflow_call:
    inputs:
      head_sha:
        required: true
        type: string
      should_publish:
        required: true
        type: boolean

concurrency:
  group: docs-website-build-${{ inputs.head_sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}
      - id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            docs/website/**

  build-website:
    name: "Build website"
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: docs/website
        run: npm install

      - name: Build documentation website
        working-directory: docs/website
        run: npm run build

      - name: Upload GitHub Pages artifact
        if: inputs.should_publish
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/website/public

  publish-website:
    name: "Publish website"
    needs: build-website
    if: inputs.should_publish && needs.build-website.result == 'success'
    runs-on: ubuntu-24.04
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
