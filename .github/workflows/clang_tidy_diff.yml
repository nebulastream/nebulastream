name: Clang-Tidy-Diff
description: |
  This workflow computes the clang-tidy check for the git diff between base and head.
  we generate GitHub PR annotations based on the output of clang-tidy if this workflow was called within the context
  of a pr.
on:
  workflow_call:
    inputs:
      dev_image_tag:
        required: true
        type: string
        description: "Docker image tag of the development image"
      head_sha:
        type: string
        required: true
        description: "commit sha of head"
      base_sha:
        type: string
        required: true
        description: "commit sha of base"
      number_of_commits:
        type: number
        required: false
        default: -1

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  check-clang-tidy:
    # The diff check builds the whole project plus runs clang-tidy on the GitHub-hosted
    # runner, which is slow; give it generous headroom so it doesn't time out spuriously.
    timeout-minutes: 180
    name: Clang-Tidy Diff
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        arch: [ x64 ]
        stdlib: [ 'libcxx' ]
        sanitizer: [ 'none' ]
        build_type: [ 'Debug' ]
        include:
          - arch: x64
            runner: [ "ubuntu-24.04" ]
    steps:
      - name: Include base commit
        id: increment
        run: echo "result=$((${{ inputs.number_of_commits }} + 1))" >> $GITHUB_OUTPUT
      - name: Checkout Branch
        uses: actions/checkout@v5
        with:
          fetch-depth: ${{ steps.increment.outputs.result }}
          ref: ${{ inputs.head_sha }}
      - uses: ./.github/steps/setup-sccache
        with:
          bucket: ${{ secrets.SCCACHE_CACHE_BUCKET }}
          endpoint: ${{ secrets.SCCACHE_CACHE_ENDPOINT }}
          access_key: ${{ secrets.SCCACHE_CACHE_ACCESS_KEY }}
          secret_key: ${{ secrets.SCCACHE_CACHE_SECRET_KEY }}
      - uses: ./.github/steps/prepare-github
        with:
          images: |
            nebulastream/nes-ci:${{ inputs.dev_image_tag }}-${{ matrix.stdlib }}-${{matrix.sanitizer}}
      - uses: ./.github/steps/run-in-container
        name: CMake Build
        with:
          image_name: nebulastream/nes-ci:${{ inputs.dev_image_tag }}-${{ matrix.stdlib }}-${{matrix.sanitizer}}
          run: |
            source .github/.env/test-${{matrix.sanitizer}}.env
            # TODO #1788: Replace the full build with a code-generation-only target for static analysis.
            cmake -GNinja -B build -DUSE_SANITIZER=${{ matrix.sanitizer }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DNES_LOG_LEVEL=DEBUG -DNES_SPLIT_TEST_BINARIES=OFF
            # We need to build the project, as some headers are only created during the build.
            cmake --build build -j  -- -k 0
      - uses: ./.github/steps/run-in-container
        name: Run Clang Tidy Pre-check
        with:
          image_name: nebulastream/nes-ci:${{ inputs.dev_image_tag }}-${{ matrix.stdlib }}-${{matrix.sanitizer}}
          run: |
            # Fast-fail pass: only duplicate includes, so trivial mistakes surface
            # before the full all-checks pass below.
            printf "Checks: \"-*,readability-duplicate-include\"\nWarningsAsErrors: \"*\"\n" > build/clang-tidy-precheck.yaml
            export NES_TIDY_DIFF_BASE=${{ inputs.base_sha }}
            export NES_TIDY_DIFF_CONFIG_FILE=$(pwd)/build/clang-tidy-precheck.yaml
            # Export fixes here too: if this pass fails the job stops, and the
            # PR-comment bot still needs a fixes.yml to annotate from.
            export NES_TIDY_DIFF_EXPORT_FIXES=$(pwd)/clang-tidy-result/fixes.yml
            cmake --build build --target tidy-diff
      - uses: ./.github/steps/run-in-container
        name: Run Clang Tidy with all Checks
        with:
          image_name: nebulastream/nes-ci:${{ inputs.dev_image_tag }}-${{ matrix.stdlib }}-${{matrix.sanitizer}}
          run: |
            export NES_TIDY_DIFF_BASE=${{ inputs.base_sha }}
            export NES_TIDY_DIFF_EXPORT_FIXES=$(pwd)/clang-tidy-result/fixes.yml
            cmake --build build --target tidy-diff
      - name: Upload Clang-Tidy Results
        if: ${{ !cancelled() && !github.event.act }}
        uses: actions/upload-artifact@v5
        with:
          if-no-files-found: warn
          name: clang-tidy-result
          path: |
            clang-tidy-result
            build/clang-tidy-diff-report.txt
      - name: Run clang-tidy-pr-comments action
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        # requires python3-venv
        uses: platisd/clang-tidy-pr-comments@v1
        with:
          github_token: ${{ github.token }}
          clang_tidy_fixes: clang-tidy-result/fixes.yml
          request_changes: false
          # Optionally set the number of comments per review to avoid GitHub API timeouts for heavily loaded pull requests
          suggestions_per_comment: 100
          auto_resolve_conversations: true
          python_path: /usr/bin/python3
