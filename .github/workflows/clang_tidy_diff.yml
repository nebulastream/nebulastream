name: Clang-Tidy-Diff
description: |
  This workflow computes the clang-tidy check for the git diff between base and head.
  Any finding flagged in .clang-tidy's WarningsAsErrors list fails the job. Findings are reported in
  the job log and the uploaded fixes.yml artifact — not as PR comments, so this needs no write
  permissions and therefore runs on the normal pull_request path for forks too.
on:
  workflow_call:
    inputs:
      dev_image_tag:
        required: true
        type: string
        description: "Docker image tag of the development image"
      head_sha:
        type: string
        required: true
        description: "commit sha of head"
      base_sha:
        type: string
        required: true
        description: "commit sha of base"
      number_of_commits:
        type: number
        required: false
        default: -1

# Read-only: findings are hard errors, not PR comments.
permissions:
  contents: read

jobs:
  check-clang-tidy:
    # The diff check builds the whole project plus runs clang-tidy on the GitHub-hosted
    # runner, which is slow; give it generous headroom so it doesn't time out spuriously.
    timeout-minutes: 180
    name: Clang-Tidy Diff
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        arch: [ x64 ]
        stdlib: [ 'libcxx' ]
        sanitizer: [ 'none' ]
        build_type: [ 'Debug' ]
        include:
          - arch: x64
            runner: [ "ubuntu-24.04" ]
    steps:
      - name: Include base commit
        id: increment
        run: echo "result=$((${{ inputs.number_of_commits }} + 1))" >> $GITHUB_OUTPUT
      - name: Checkout Branch
        uses: actions/checkout@v5
        with:
          fetch-depth: ${{ steps.increment.outputs.result }}
          ref: ${{ inputs.head_sha }}
      - uses: ./.github/steps/setup-sccache
        with:
          bucket: ${{ secrets.SCCACHE_CACHE_BUCKET }}
          endpoint: ${{ secrets.SCCACHE_CACHE_ENDPOINT }}
          access_key: ${{ secrets.SCCACHE_CACHE_ACCESS_KEY }}
          secret_key: ${{ secrets.SCCACHE_CACHE_SECRET_KEY }}
      - uses: ./.github/steps/prepare-github
        with:
          image_name: nebulastream/nes-ci:${{ inputs.dev_image_tag }}-${{ matrix.stdlib }}-${{matrix.sanitizer}}
      - uses: ./.github/steps/run-in-container
        name: CMake Build
        with:
          image_name: nebulastream/nes-ci:${{ inputs.dev_image_tag }}-${{ matrix.stdlib }}-${{matrix.sanitizer}}
          run: |
            source .github/.env/test-${{matrix.sanitizer}}.env
            # TODO #1788: Replace the full build with a code-generation-only target for static analysis.
            cmake -GNinja -B build -DUSE_SANITIZER=${{ matrix.sanitizer }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DNES_LOG_LEVEL=DEBUG -DNES_SPLIT_TEST_BINARIES=OFF
            # We need to build the project, as some headers are only created during the build.
            cmake --build build -j  -- -k 0
      - name: Create results directory
        run: mkdir clang-tidy-result
      - uses: ./.github/steps/run-in-container
        name: Run Clang Tidy Pre-check
        with:
          image_name: nebulastream/nes-ci:${{ inputs.dev_image_tag }}-${{ matrix.stdlib }}-${{matrix.sanitizer}}
          run: |
            git diff -U0 ${{ inputs.base_sha }} -- ':!*.inc' ':!*nes-rust-bindings' ':!vcpkg/**' | clang-tidy-diff-19.py -clang-tidy-binary clang-tidy-19 -p1 -path build -export-fixes clang-tidy-result/fixes.yml  -checks='-*,readability-duplicate-include' -j $(nproc)
      - uses: ./.github/steps/run-in-container
        name: Run Clang Tidy with all Checks
        with:
          image_name: nebulastream/nes-ci:${{ inputs.dev_image_tag }}-${{ matrix.stdlib }}-${{matrix.sanitizer}}
          run: |
            git diff -U0 ${{ inputs.base_sha }} -- ':!*.inc' ':!*nes-rust-bindings' ':!vcpkg/**' | clang-tidy-diff-19.py -clang-tidy-binary clang-tidy-19 -p1 -path build -export-fixes clang-tidy-result/fixes.yml -j $(nproc)
      # Findings are printed by clang-tidy-diff in the steps above and exported here for download.
      # A failing step means clang-tidy flagged something in .clang-tidy's WarningsAsErrors list.
      - name: Upload Clang-Tidy Results
        if: ${{ !cancelled() && !github.event.act }}
        uses: actions/upload-artifact@v5
        with:
          if-no-files-found: warn
          name: clang-tidy-result
          path: clang-tidy-result
