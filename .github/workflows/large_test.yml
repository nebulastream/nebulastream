name: Build and Run Large Tests
description: This workflow builds and tests a head_sha, on a combination of different architectures and standard libraries.
on:
  workflow_call:
    inputs:
      dev_image_tag:
        required: true
        type: string
        description: "Docker image tag of the development image"
      head_sha:
        type: string
        required: true
        description: "head_sha of the branch"

jobs:
  build-and-test-linux:
    name: "Run large scale tests on ${{matrix.arch}} with ${{matrix.stdlib}} in ${{ matrix.build_type }}"
    container:
      image: nebulastream/nes-ci:${{ inputs.dev_image_tag }}-${{ matrix.stdlib }}-${{ matrix.sanitizer }}
      volumes:
        - test-file-cache:/test-file-cache
        - /var/run/docker.sock:/var/run/docker.sock
      env:
        MOLD_JOBS: 1
        SCCACHE_BUCKET: ${{ secrets.SCCACHE_CACHE_BUCKET }}
        SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_CACHE_ENDPOINT }}
        SCCACHE_REGION: auto
        SCCACHE_S3_USE_SSL: "true"
        AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_CACHE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_CACHE_SECRET_KEY }}
      # TODO #401 Investigate rootless docker containers
      options: --user root
    timeout-minutes: 40
    runs-on: [ self-hosted, linux, Build, "${{matrix.arch}}" ]
    strategy:
      fail-fast: false
      matrix:
        arch: [ x64 ]
        stdlib: [ 'libcxx' ]
        sanitizer: [ 'none' ]
        build_type: [ 'RelWithDebInfo', 'Release' ]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha }}
      - name: Configure NebulaStream
        run: cmake -GNinja -B build -DUSE_SANITIZER=${{ matrix.sanitizer }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DENABLE_LARGE_TESTS=ON -DExternalData_OBJECT_STORES=/test-file-cache -DNES_LOG_LEVEL=DEBUG
      - name: Build NebulaStream
        run: cmake --build build --target systest -j
      - name: Run large System Level Tests
        run: ctest --test-dir build --output-on-failure -L LargeTest
      - name: Upload Test Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure() && !github.event.act
        with:
          name: test-logs-${{ matrix.arch }}-${{ matrix.stdlib }}-${{ matrix.build_type }}
          path: build/nes-systests/SystemTest_*.log

  systest-remote-test:
    name: "Run systest remote test on ${{matrix.arch}} with ${{matrix.stdlib}}"
    container:
      image: nebulastream/nes-development:${{ inputs.dev_image_tag }}-${{ matrix.stdlib }}-${{ matrix.sanitizer }}
      volumes:
        - ccache:/ccache
        - test-file-cache:/test-file-cache
        - /var/run/docker.sock:/var/run/docker.sock
      env:
        CCACHE_DIR: /ccache
        MOLD_JOBS: 1
      options: --user root
    timeout-minutes: 40
    runs-on: [ self-hosted, linux, Build, "${{matrix.arch}}" ]
    strategy:
      fail-fast: false
      matrix:
        arch: [ x64 ]
        stdlib: [ 'libcxx' ]
        sanitizer: [ 'none' ]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha }}
      - name: Configure NebulaStream
        run: cmake -GNinja -B build -DUSE_SANITIZER=${{ matrix.sanitizer }} -DCMAKE_BUILD_TYPE=RelWithDebInfo -DENABLE_LARGE_TESTS=ON -DExternalData_OBJECT_STORES=/test-file-cache
      - name: Build NebulaStream
        run: cmake --build build --target systest nes-single-node-worker -j
      - name: Run systest remote test
        run: ctest --test-dir build --output-on-failure --timeout 2400 -R systest-remote-test
      - name: Upload Test Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure() && !github.event.act
        with:
          name: systest-remote-test-logs-${{ matrix.arch }}-${{ matrix.stdlib }}
          path: build/test-tmp/
