name: NES PR CI
description: |
  The following pipeline is meant to run for every PR.
  It will also apply the format check. If these steps are successful, it will try to build the PR and run the tests.
  If this pr is called with act, it has to be used with a custom event.json and called via `act -e event.json`.
  Otherwise, we are not running the job, as mentioned: https://github.com/nektos/act/issues/720
on:
  pull_request:
    types: [ synchronize, opened, reopened, edited ]
  merge_group:
    branches: [ main ]

# cancel previous runs of same PR / branch.
# In merge_group runs github.head_ref is empty, so fall back to github.ref (the unique
# gh-readonly-queue ref) to avoid queued runs cancelling each other.
# A title/body edit ('edited' without a base change) is skipped by the get-dev-images gate, but
# concurrency is evaluated before that gate — so isolate those runs in a unique group, otherwise
# cancel-in-progress would kill a legit in-progress build before the skip even happens.
concurrency:
  # run_id suffix gives no-op edits a private group; drop it if 'edited' is ever removed from triggers.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}-pr${{ (github.event.action == 'edited' && github.event.changes.base == null) && format('-noop-{0}', github.run_id) || '' }}
  cancel-in-progress: true

jobs:
  # Decide whether this PR only touches docs (see .github/ci/full-ci-skip-paths.txt). If so, every
  # heavy caller below is skipped, and the per-area "<area> Done" gate jobs (which always run) report
  # success so branch protection is satisfied without dispatching a single build.
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      docs_only: ${{ steps.decide.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so tj-actions can diff base_sha..sha; a shallow clone yields an empty diff.
          fetch-depth: 0
      - uses: tj-actions/changed-files@v44
        id: filter
        with:
          base_sha: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          sha: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          files_from_source_file: .github/ci/full-ci-skip-paths.txt
      - id: decide
        shell: bash
        run: |
          # docs_only requires POSITIVE evidence: at least one skip-listed (doc) file changed
          # (any_changed) AND every changed file is skip-listed (only_changed). An empty or failed
          # diff yields any_changed=false, so we fall through to docs_only=false and run the full
          # pipeline. Fail-safe: a real code change is never skipped.
          only='${{ steps.filter.outputs.only_changed }}'
          any='${{ steps.filter.outputs.any_changed }}'
          echo "only_changed=$only any_changed=$any"
          if [ "$only" = "true" ] && [ "$any" = "true" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  get-dev-images:
    needs: [ detect-changes ]
    # 'edited' fires on title/body/base changes; only rerun the pipeline when the base branch changed.
    # Also skipped on docs-only PRs so nothing heavy is dispatched.
    if: ${{ (github.event.action != 'edited' || github.event.changes.base != null) && needs.detect-changes.outputs.docs_only != 'true' }}
    uses: ./.github/workflows/get_dev_images.yml
    secrets: inherit
    with:
      branch-name: ${{ github.head_ref || github.sha }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}

  smoke-tests:
    needs: [ detect-changes, get-dev-images ]
    if: ${{ needs.detect-changes.outputs.docs_only != 'true' }}
    uses: ./.github/workflows/smoke-tests.yml
    with:
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      number_of_commits: ${{ github.event.pull_request.commits || -1 }}
    secrets: inherit

  build-and-test:
    needs: [ detect-changes, get-dev-images, smoke-tests ]
    if: ${{ needs.detect-changes.outputs.docs_only != 'true' }}
    name: "Run build and test"
    uses: ./.github/workflows/build_and_test.yml
    secrets: inherit
    with:
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      matrix_config: pr_matrix.yaml

  large-tests:
    needs: [ detect-changes, get-dev-images, smoke-tests ]
    if: ${{ needs.detect-changes.outputs.docs_only != 'true' }}
    name: "Run large scale tests"
    uses: ./.github/workflows/large_test.yml
    secrets: inherit
    with:
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}

  run_code_coverage:
    needs: [ detect-changes, get-dev-images, smoke-tests ]
    if: ${{ needs.detect-changes.outputs.docs_only != 'true' }}
    name: "Run Code Coverage"
    uses: ./.github/workflows/code_coverage.yml
    with:
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
    secrets: inherit

  run_endless_mode:
    needs: [ detect-changes, get-dev-images, smoke-tests ]
    if: ${{ needs.detect-changes.outputs.docs_only != 'true' }}
    name: "Run Endless Mode"
    uses: ./.github/workflows/endless-mode.yml
    secrets: inherit
    with:
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}

  test-nebuli-and-single-node-worker:
    needs: [ detect-changes, get-dev-images, smoke-tests ]
    if: ${{ needs.detect-changes.outputs.docs_only != 'true' }}
    name: "E2E Test using Nebuli and SingleNodeWorker"
    strategy:
      matrix:
        arch: [ x64 ]
    uses: ./.github/workflows/execute_query.yml
    secrets: inherit
    with:
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      runtime_seconds: '$((1*60))'
      arch: ${{ matrix.arch }}

  clang-tidy-diff:
    needs: [ detect-changes, get-dev-images, smoke-tests ]
    if: ${{ (github.event_name == 'merge_group' || github.event.pull_request.head.repo.fork == false) && needs.detect-changes.outputs.docs_only != 'true' }}
    uses: ./.github/workflows/clang_tidy_diff.yml
    with:
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      base_sha: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
      number_of_commits: ${{ github.event.pull_request.commits || -1 }}
    secrets: inherit

  nix-build:
    needs: [ detect-changes, smoke-tests ]
    if: ${{ needs.detect-changes.outputs.docs_only != 'true' }}
    name: "Run Nix Build"
    uses: ./.github/workflows/nix-build.yml
    secrets: inherit
    with:
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}

  # --- Required-check gates --------------------------------------------------------------------
  # One "<area> Done" job per pipeline area. Each always runs (if: always()) so its check is always
  # created under a stable, top-level name — set THESE as the required status checks. A gate passes
  # when the PR is docs-only (the run is legitimately skipped) or when the run succeeded.
  # docs_only is checked FIRST on purpose: a non-docs skip (e.g. a real smoke-tests failure cascading
  # downstream) must FAIL the gate, not pass it.
  smoke-tests-done:
    name: "Smoke Tests Done"
    needs: [ detect-changes, smoke-tests ]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Gate
        run: |
          if [ "${{ needs.detect-changes.outputs.docs_only }}" = "true" ]; then
            echo "docs-only PR — skipped run expected; passing."; exit 0
          fi
          if [ "${{ needs.smoke-tests.result }}" = "success" ]; then exit 0; fi
          echo "::error::smoke-tests did not succeed: ${{ needs.smoke-tests.result }}"
          exit 1

  build-and-test-done:
    name: "Build and Test Done"
    needs: [ detect-changes, build-and-test ]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Gate
        run: |
          if [ "${{ needs.detect-changes.outputs.docs_only }}" = "true" ]; then
            echo "docs-only PR — skipped run expected; passing."; exit 0
          fi
          if [ "${{ needs.build-and-test.result }}" = "success" ]; then exit 0; fi
          echo "::error::build-and-test did not succeed: ${{ needs.build-and-test.result }}"
          exit 1

  large-tests-done:
    name: "Large Tests Done"
    needs: [ detect-changes, large-tests ]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Gate
        run: |
          if [ "${{ needs.detect-changes.outputs.docs_only }}" = "true" ]; then
            echo "docs-only PR — skipped run expected; passing."; exit 0
          fi
          if [ "${{ needs.large-tests.result }}" = "success" ]; then exit 0; fi
          echo "::error::large-tests did not succeed: ${{ needs.large-tests.result }}"
          exit 1

  code-coverage-done:
    name: "Code Coverage Done"
    needs: [ detect-changes, run_code_coverage ]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Gate
        run: |
          if [ "${{ needs.detect-changes.outputs.docs_only }}" = "true" ]; then
            echo "docs-only PR — skipped run expected; passing."; exit 0
          fi
          if [ "${{ needs.run_code_coverage.result }}" = "success" ]; then exit 0; fi
          echo "::error::run_code_coverage did not succeed: ${{ needs.run_code_coverage.result }}"
          exit 1

  endless-mode-done:
    name: "Endless Mode Done"
    needs: [ detect-changes, run_endless_mode ]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Gate
        run: |
          if [ "${{ needs.detect-changes.outputs.docs_only }}" = "true" ]; then
            echo "docs-only PR — skipped run expected; passing."; exit 0
          fi
          if [ "${{ needs.run_endless_mode.result }}" = "success" ]; then exit 0; fi
          echo "::error::run_endless_mode did not succeed: ${{ needs.run_endless_mode.result }}"
          exit 1

  e2e-done:
    name: "E2E Done"
    needs: [ detect-changes, test-nebuli-and-single-node-worker ]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Gate
        run: |
          if [ "${{ needs.detect-changes.outputs.docs_only }}" = "true" ]; then
            echo "docs-only PR — skipped run expected; passing."; exit 0
          fi
          if [ "${{ needs.test-nebuli-and-single-node-worker.result }}" = "success" ]; then exit 0; fi
          echo "::error::test-nebuli-and-single-node-worker did not succeed: ${{ needs.test-nebuli-and-single-node-worker.result }}"
          exit 1

  nix-build-done:
    name: "Nix Build Done"
    needs: [ detect-changes, nix-build ]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Gate
        run: |
          if [ "${{ needs.detect-changes.outputs.docs_only }}" = "true" ]; then
            echo "docs-only PR — skipped run expected; passing."; exit 0
          fi
          if [ "${{ needs.nix-build.result }}" = "success" ]; then exit 0; fi
          echo "::error::nix-build did not succeed: ${{ needs.nix-build.result }}"
          exit 1

  clang-tidy-done:
    name: "Clang-Tidy Done"
    needs: [ detect-changes, clang-tidy-diff ]
    # Non-fork PRs and merge_group are gated here; fork PRs get their "Clang-Tidy Done" from pr-fork.yml,
    # so exactly one workflow reports this context per PR.
    if: ${{ always() && (github.event_name == 'merge_group' || github.event.pull_request.head.repo.fork == false) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Gate
        run: |
          if [ "${{ needs.detect-changes.outputs.docs_only }}" = "true" ]; then
            echo "docs-only PR — skipped run expected; passing."; exit 0
          fi
          if [ "${{ needs.clang-tidy-diff.result }}" = "success" ]; then exit 0; fi
          echo "::error::clang-tidy-diff did not succeed: ${{ needs.clang-tidy-diff.result }}"
          exit 1
