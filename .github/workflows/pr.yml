name: NES PR Code CI
description: |
  The following pipeline is meant to run for every PR that touches non-documentation files.
  It will also apply the format check. If these steps are successful, it will try to build the PR and run the tests.
  Documentation-only PRs are handled by pr-docs.yml.
  If this pr is called with act, it has to be used with a custom event.json and called via `act -e event.json`.
  Otherwise, we are not running the job, as mentioned: https://github.com/nektos/act/issues/720
on:
  pull_request:
    types: [ synchronize, opened, reopened, edited ]
  merge_group:
    branches: [ main ]

# cancel previous runs of same PR / branch.
# In merge_group runs github.head_ref is empty, so fall back to github.ref (the unique
# gh-readonly-queue ref) to avoid queued runs cancelling each other.
# A title/body edit ('edited' without a base change) is skipped by the get-dev-images gate, but
# concurrency is evaluated before that gate — so isolate those runs in a unique group, otherwise
# cancel-in-progress would kill a legit in-progress build before the skip even happens.
concurrency:
  # run_id suffix gives no-op edits a private group; drop it if 'edited' is ever removed from triggers.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}-pr${{ (github.event.action == 'edited' && github.event.changes.base == null) && format('-noop-{0}', github.run_id) || '' }}
  cancel-in-progress: true

jobs:
  # Decide whether this PR touches any non-documentation file (see .github/ci/full-ci-skip-paths.txt).
  # If it does not, every heavy caller below is skipped and the single "Code CI Done" gate (which
  # always runs) reports success so branch protection is satisfied without dispatching a build.
  classify:
    runs-on: ubuntu-24.04
    outputs:
      hasCodeChanges: ${{ steps.classify.outputs.hasCodeChanges }}
      hasDocChanges: ${{ steps.classify.outputs.hasDocChanges }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so tj-actions can diff base_sha..sha; a shallow clone yields an empty diff.
          fetch-depth: 0
      - id: classify
        uses: ./.github/actions/classify-pr-changes
        with:
          base-sha: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          head-sha: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}

  get-dev-images:
    needs: [ classify ]
    # 'edited' fires on title/body/base changes; only rerun the pipeline when the base branch changed.
    # Also skipped when nothing but documentation changed so nothing heavy is dispatched.
    if: ${{ (github.event.action != 'edited' || github.event.changes.base != null) && needs.classify.outputs.hasCodeChanges == 'true' }}
    uses: ./.github/workflows/get_dev_images.yml
    secrets: inherit
    with:
      branch-name: ${{ github.head_ref || github.sha }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}

  smoke-tests:
    needs: [ classify, get-dev-images ]
    if: ${{ needs.classify.outputs.hasCodeChanges == 'true' }}
    uses: ./.github/workflows/smoke-tests.yml
    with:
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      number_of_commits: ${{ github.event.pull_request.commits || -1 }}
    secrets: inherit

  build-and-test:
    needs: [ classify, get-dev-images, smoke-tests ]
    if: ${{ needs.classify.outputs.hasCodeChanges == 'true' }}
    name: "Run build and test"
    uses: ./.github/workflows/build_and_test.yml
    secrets: inherit
    with:
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      matrix_config: pr_matrix.yaml

  large-tests:
    needs: [ classify, get-dev-images, smoke-tests ]
    if: ${{ needs.classify.outputs.hasCodeChanges == 'true' }}
    name: "Run large scale tests"
    uses: ./.github/workflows/large_test.yml
    secrets: inherit
    with:
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}

  run_code_coverage:
    needs: [ classify, get-dev-images, smoke-tests ]
    if: ${{ needs.classify.outputs.hasCodeChanges == 'true' }}
    name: "Run Code Coverage"
    uses: ./.github/workflows/code_coverage.yml
    with:
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
    secrets: inherit

  run_endless_mode:
    needs: [ classify, get-dev-images, smoke-tests ]
    if: ${{ needs.classify.outputs.hasCodeChanges == 'true' }}
    name: "Run Endless Mode"
    uses: ./.github/workflows/endless-mode.yml
    secrets: inherit
    with:
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}

  test-nebuli-and-single-node-worker:
    needs: [ classify, get-dev-images, smoke-tests ]
    if: ${{ needs.classify.outputs.hasCodeChanges == 'true' }}
    name: "E2E Test using Nebuli and SingleNodeWorker"
    strategy:
      matrix:
        arch: [ x64 ]
    uses: ./.github/workflows/execute_query.yml
    secrets: inherit
    with:
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      runtime_seconds: '$((1*60))'
      arch: ${{ matrix.arch }}

  clang-tidy-diff:
    needs: [ classify, get-dev-images, smoke-tests ]
    # Runs for every PR, forks included. clang-tidy findings are hard errors and no longer posted as
    # PR comments, so no elevated permissions are needed and no pull_request_target mirror exists.
    if: ${{ needs.classify.outputs.hasCodeChanges == 'true' }}
    uses: ./.github/workflows/clang_tidy_diff.yml
    with:
      dev_image_tag: ${{ needs.get-dev-images.outputs.image-tag }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      base_sha: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
      number_of_commits: ${{ github.event.pull_request.commits || -1 }}
    secrets: inherit

  nix-build:
    needs: [ classify, smoke-tests ]
    if: ${{ needs.classify.outputs.hasCodeChanges == 'true' }}
    name: "Run Nix Build"
    uses: ./.github/workflows/nix-build.yml
    secrets: inherit
    with:
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}

  # --- Required-check gate ----------------------------------------------------------------------
  # The single required status check for code changes. It always runs (if: always()) so the context
  # is always created under a stable, top-level name — set THIS as the required status check.
  # It passes when the run was legitimately skipped (no code changes, or a no-op PR edit) and
  # otherwise requires every dispatched job to have succeeded.
  code-ci-done:
    name: "Code CI Done"
    needs: [ classify, get-dev-images, smoke-tests, build-and-test, large-tests,
             run_code_coverage, run_endless_mode, test-nebuli-and-single-node-worker,
             clang-tidy-diff, nix-build ]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Gate
        env:
          HAS_CODE: ${{ needs.classify.outputs.hasCodeChanges }}
          # A title/body 'edited' event legitimately dispatches nothing; see the get-dev-images gate.
          NOOP_EDIT: ${{ github.event.action == 'edited' && github.event.changes.base == null }}
          RESULTS: ${{ toJSON(needs) }}
        run: |
          # The legitimate-skip cases are checked FIRST on purpose: a real cascade failure (e.g. a
          # smoke-tests failure skipping everything downstream) must FAIL the gate, not pass it.
          if [ "$HAS_CODE" != "true" ]; then
            echo "No code changes — code CI legitimately skipped; passing."; exit 0
          fi
          if [ "$NOOP_EDIT" = "true" ]; then
            echo "No-op PR edit — nothing dispatched; passing."; exit 0
          fi
          if echo "$RESULTS" | jq -e 'all(.[]; .result == "success")' > /dev/null; then
            echo "All code CI jobs succeeded."; exit 0
          fi
          echo "::error::Some code CI jobs did not succeed:"
          echo "$RESULTS" | jq -r 'to_entries[] | select(.value.result != "success") | "  \(.key): \(.value.result)"'
          exit 1
