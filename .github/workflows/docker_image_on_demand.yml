name: NES Docker Image On Demand
description: |
  This workflow is triggered manually by the user to build docker images for the executable image.
  The user can specify the branch for which the docker image needs to be built.
  The docker image is built for the specified branch and pushed to the docker hub.


on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch (or head_sha) to build docker executable images for'
        required: true
        default: 'main'

jobs:
  sanitize:
    name: Sanitize branch name
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sanitize.outputs.tag }}
    steps:
      - name: Sanitize branch name for Docker tag
        id: sanitize
        shell: bash
        run: |
          BRANCH_NAME="${{ inputs.branch }}"
          # Docker tags allow only [a-zA-Z0-9._-] and max 128 chars.
          # Replace all invalid characters (e.g. '/') with '-', strip leading '.' or '-'.
          SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^[.-]*//' | cut -c1-128)
          echo "Sanitized branch name: '$BRANCH_NAME' -> '$SANITIZED'"
          echo "tag=$SANITIZED" >> "$GITHUB_OUTPUT"

  create_image:
    needs: sanitize
    uses: ./.github/workflows/create_release_image.yml
    secrets: inherit
    with:
      head_sha: ${{ inputs.branch }}
      dockerhub-tag: ${{ needs.sanitize.outputs.tag }}
