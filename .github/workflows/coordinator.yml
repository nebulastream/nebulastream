# Builds and tests the Rust crates that make up the coordinator
# (model, migration, controller, coordinator). Triggered on PRs that
# touch any of those crates or this workflow, plus every push to main.
name: Coordinator

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'nes-coordinator/**'
      - 'grpc/**'
      - '.github/workflows/coordinator.yml'
  push:
    branches: [ main ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'nes-coordinator/**'
      - 'grpc/**'
      - '.github/workflows/coordinator.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: cargo test --workspace
        run: cargo test --workspace --locked
      - name: cargo test --test simulation (madsim)
        run: cargo test -p coordinator --test simulation --locked -- --test-threads=1
        env:
          RUSTFLAGS: --cfg madsim
