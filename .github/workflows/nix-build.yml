name: Nix Build

on:
  workflow_call:
    inputs:
      head_sha:
        type: string
        required: true
        description: "ref of the branch"
    secrets:
      SCCACHE_CACHE_BUCKET:
        required: false
      SCCACHE_CACHE_ENDPOINT:
        required: false
      SCCACHE_CACHE_ACCESS_KEY:
        required: false
      SCCACHE_CACHE_SECRET_KEY:
        required: false
  workflow_dispatch:
    inputs:
      head_sha:
        type: string
        required: false
        description: "ref of the branch"

permissions:
  contents: read
  id-token: write

jobs:
  nix-build:
    name: "Nix Build"
    timeout-minutes: 90
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
          use-gha-cache: true

      - uses: ./.github/steps/setup-sccache
        with:
          bucket: ${{ secrets.SCCACHE_CACHE_BUCKET }}
          endpoint: ${{ secrets.SCCACHE_CACHE_ENDPOINT }}
          access_key: ${{ secrets.SCCACHE_CACHE_ACCESS_KEY }}
          secret_key: ${{ secrets.SCCACHE_CACHE_SECRET_KEY }}

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          version=0.14.0
          case "$(uname -m)" in
            x86_64) target=x86_64-unknown-linux-musl ;;
            aarch64) target=aarch64-unknown-linux-musl ;;
            *) echo "Unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          install_dir="$RUNNER_TEMP/sccache"
          mkdir -p "$install_dir"
          curl -fsSL "https://github.com/mozilla/sccache/releases/download/v${version}/sccache-v${version}-${target}.tar.gz" \
            | tar xz -C "$install_dir" --strip-components=1 "sccache-v${version}-${target}/sccache"
          chmod +x "$install_dir/sccache"
          echo "SCCACHE_BIN=$install_dir/sccache" >> "$GITHUB_ENV"
          "$install_dir/sccache" --version

      - name: Configure via devShell
        run: |
          ./.nix/nix-cmake.sh -DCMAKE_BUILD_TYPE=Debug -DUSE_BUILD_CACHE=OFF -DNES_SPLIT_TEST_BINARIES=OFF -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_BIN" -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_BIN" -G Ninja -S . -B cmake-build-nix

      - name: Build via devShell
        run: |
          "$SCCACHE_BIN" --show-stats
          ./.nix/nix-cmake.sh --build cmake-build-nix -j"$(nproc)" -- -k 0
          "$SCCACHE_BIN" --show-stats
          "$SCCACHE_BIN" --stop-server

      - name: Run Unit Tests via devShell
        run: |
          source .github/.env/test-none.env
          ./.nix/nix-run.sh ctest --test-dir cmake-build-nix -j -LE "Systest|DockerCompose" --output-on-failure --output-junit cmake-build-nix/junit-unit.xml --timeout 2400 ${ADDITIONAL_CTEST_ARGS}

      - name: Run system tests via devShell
        run: |
          source .github/.env/test-none.env
          ./.nix/nix-run.sh ctest --test-dir cmake-build-nix -j -L Systest --output-on-failure --output-junit cmake-build-nix/junit-systest.xml --timeout 4800 ${ADDITIONAL_CTEST_ARGS}

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: nix-build-logs
          path: |
            cmake-build-nix/CMakeFiles/CMakeOutput.log
            cmake-build-nix/CMakeFiles/CMakeError.log
          retention-days: 7
