name: Create Container for Head_SHA
description: |
  Builds the executable images (nes-cli, nes-repl, nes-repl-embedded, worker) for the given
  head_sha (branch, tag, or commit sha) via the `package-docker-images` CMake target and
  publishes them to Docker Hub, tagged as specified via the parameter.
on:
  workflow_call:
    inputs:
      head_sha:
        description: 'head_sha to build docker executable images for'
        required: true
        type: string
      dockerhub-tag:
        description: 'tag to tag the image on dockerhub with'
        required: true
        type: string

jobs:
  get-dev-images:
    uses: ./.github/workflows/get_dev_images.yml
    secrets: inherit
    with:
      head_sha: ${{ inputs.head_sha }}

  sanitize-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sanitize.outputs.tag }}
    steps:
      - name: Sanitize dockerhub tag for Docker compatibility
        id: sanitize
        shell: bash
        run: |
          TAG="${{ inputs.dockerhub-tag }}"
          # Docker tags allow only [a-zA-Z0-9._-] and max 128 chars.
          SANITIZED=$(echo "$TAG" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^[.-]*//' | cut -c1-128)
          echo "Sanitized tag: '$TAG' -> '$SANITIZED'"
          echo "tag=$SANITIZED" >> "$GITHUB_OUTPUT"

  build-image:
    runs-on: [ self-hosted, linux, Build, "${{matrix.arch}}" ]
    needs: [ get-dev-images, sanitize-tag ]
    strategy:
      fail-fast: false
      matrix:
        arch: [ x64, arm64 ]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_SECRET }}
      - name: Build Runtime Base Image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: nebulastream/nes-runtime-base:${{ inputs.dockerhub-tag }}-${{ matrix.arch }}
          context: .
          file: ${{ github.workspace }}/docker/runtime/RuntimeBase.dockerfile
      - name: Pull development image
        run: docker pull nebulastream/nes-development:${{ needs.get-dev-images.outputs.image-tag }}
      # Configure only (tests off), then let the `package-docker-images` target run
      # `docker build --target build-in-docker` per binary: the compilation happens
      # inside the docker build with its persistent ccache cache mount. `-j 1`
      # serializes the four image builds so each benefits from the ccache the
      # previous one populated (matching the previously sequential build steps).
      - name: Build executable images via package-docker-images CMake target
        uses: ./.github/steps/run-in-container
        with:
          image_name: nebulastream/nes-development:${{ needs.get-dev-images.outputs.image-tag }}
          run: |
            export NES_DOCKER_BUILD_IN_DOCKER=1
            export NES_DOCKER_TAG=${{ needs.sanitize-tag.outputs.tag }}-${{ matrix.arch }}
            export NES_RUNTIME_TAG=${{ inputs.dockerhub-tag }}-${{ matrix.arch }}
            export NES_DEV_TAG=${{ needs.get-dev-images.outputs.image-tag }}
            cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DNES_ENABLES_TESTS=0
            cmake --build build -j 1 --target package-docker-images
      - name: Push executable images
        run: |
          for image in nes-cli nes-repl nes-repl-embedded worker; do
            docker push "nebulastream/${image}:${{ needs.sanitize-tag.outputs.tag }}-${{ matrix.arch }}"
          done

  merge-images:
    name: "Merge images for different platforms into a single Multi-Platform image"
    needs: [ build-image, sanitize-tag ]
    runs-on: [ self-hosted, linux, Build ]
    steps:
      - name: Login to Docker Hub
        if: ${{ !github.event.act }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_SECRET }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Combine Manifests
        run: |
          docker buildx imagetools create -t nebulastream/nes-runtime-base:${{ inputs.dockerhub-tag }} \
            nebulastream/nes-runtime-base:${{ inputs.dockerhub-tag }}-x64 \
            nebulastream/nes-runtime-base:${{ inputs.dockerhub-tag }}-arm64

          docker buildx imagetools create -t nebulastream/nes-repl-embedded:${{ needs.sanitize-tag.outputs.tag }} \
            nebulastream/nes-repl-embedded:${{ needs.sanitize-tag.outputs.tag }}-x64 \
            nebulastream/nes-repl-embedded:${{ needs.sanitize-tag.outputs.tag }}-arm64

          docker buildx imagetools create -t nebulastream/nes-cli:${{ needs.sanitize-tag.outputs.tag }} \
            nebulastream/nes-cli:${{ needs.sanitize-tag.outputs.tag }}-x64 \
            nebulastream/nes-cli:${{ needs.sanitize-tag.outputs.tag }}-arm64

          docker buildx imagetools create -t nebulastream/nes-repl:${{ needs.sanitize-tag.outputs.tag }} \
            nebulastream/nes-repl:${{ needs.sanitize-tag.outputs.tag }}-x64 \
            nebulastream/nes-repl:${{ needs.sanitize-tag.outputs.tag }}-arm64

          docker buildx imagetools create -t nebulastream/worker:${{ needs.sanitize-tag.outputs.tag }} \
            nebulastream/worker:${{ needs.sanitize-tag.outputs.tag }}-x64 \
            nebulastream/worker:${{ needs.sanitize-tag.outputs.tag }}-arm64
