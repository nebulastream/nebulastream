name: Prepare GitHub CI Server Instance
description: |
  Prepares a github ci server instance by removing unnecessary pre-installed software and pulling the docker image.

inputs:
  image_name:
    description: 'name of the docker image to prepare'
    required: true
  docker_username:
    description: 'Docker Hub username for authenticated pulls'
    required: false
  docker_password:
    description: 'Docker Hub password/token for authenticated pulls'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Login to Docker Hub
      shell: bash
      run: |
        if [ -n "${{ inputs.docker_username }}" ] && [ -n "${{ inputs.docker_password }}" ]; then
          echo "${{ inputs.docker_password }}" | docker login -u "${{ inputs.docker_username }}" --password-stdin
        fi
    - name: Maximize build space
      shell: bash
      run: |
        docker pull ${{inputs.image_name}} &

        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        df -h
        wait
