syntax = "proto3";
import "SerializableQueryId.proto";
import "SerializableQueryPlan.proto";
import "google/protobuf/empty.proto";

service WorkerRPCService {
  rpc RegisterQuery (RegisterQueryRequest) returns (RegisterQueryReply) {}
  rpc UnregisterQuery (UnregisterQueryRequest) returns (google.protobuf.Empty) {}

  rpc StartQuery (StartQueryRequest) returns (google.protobuf.Empty) {}
  rpc StopQuery (StopQueryRequest) returns (google.protobuf.Empty) {}

  rpc RequestQueryStatus (QueryStatusRequest) returns (QueryStatusReply) {}
  rpc RequestQueryLog (QueryLogRequest) returns (QueryLogReply) {}
  rpc RequestStatus (WorkerStatusRequest) returns (WorkerStatusResponse) {}
}

message RegisterQueryRequest {
  NES.SerializableQueryPlan queryPlan = 1;
}

message RegisterQueryReply {
  NES.SerializableQueryId queryId = 1;
}

message UnregisterQueryRequest {
  NES.SerializableQueryId queryId = 1;
}

message StartQueryRequest {
  NES.SerializableQueryId queryId = 1;
}

message StopQueryRequest {
    enum QueryTerminationType {Graceful = 0; HardStop = 1; Failure = 2; Invalid = 3;};
    NES.SerializableQueryId queryId = 2;
    QueryTerminationType terminationType = 3;
}

enum QueryState {
    Registered = 0;
    Started = 1;
    Running = 2;
    Stopped = 3;
    Failed = 4;
}

message Error {
    uint64 code = 1;
    string message = 2;
    string stackTrace = 3; /// currently untyped
    string location = 4; /// currently untyped
}

message QueryStatusRequest {
  NES.SerializableQueryId queryId = 1;
}

message QueryMetrics {
   optional uint64 startUnixTimeInMs = 1;
   optional uint64 runningUnixTimeInMs = 2;
   optional uint64 stopUnixTimeInMs = 3;
   optional Error error = 4;
}

message QueryStatusReply {
    NES.SerializableQueryId queryId = 1;
    QueryState state = 2;
    QueryMetrics metrics = 3;
}

message QueryLogRequest {
    NES.SerializableQueryId queryId = 1;
}

message QueryLogEntry {
    QueryState state = 1;
    uint64 unixTimeInMs = 2;
    optional Error error = 3;
}

message QueryLogReply {
    repeated QueryLogEntry entries = 1;
}

message WorkerStatusRequest {
  uint64 after_unix_timestamp_in_milli_seconds = 1;
}

message WorkerStatusResponse {
  message ReplayMetrics {
    enum RecordingLifecycleState {
      RECORDING_LIFECYCLE_STATE_NEW = 0;
      RECORDING_LIFECYCLE_STATE_INSTALLING = 1;
      RECORDING_LIFECYCLE_STATE_FILLING = 2;
      RECORDING_LIFECYCLE_STATE_READY = 3;
      RECORDING_LIFECYCLE_STATE_DRAINING = 4;
      RECORDING_LIFECYCLE_STATE_DELETED = 5;
    }

    message ReplayOperatorStatistics {
      string node_fingerprint = 1;
      uint64 input_tuples = 2;
      uint64 output_tuples = 3;
      uint64 task_count = 4;
      uint64 execution_time_nanos = 5;
    }

    message RecordingStatus {
      string recording_id = 1;
      string file_path = 2;
      RecordingLifecycleState lifecycle_state = 3;
      optional uint64 retention_window_ms = 4;
      optional uint64 retained_start_watermark = 5;
      optional uint64 retained_end_watermark = 6;
      optional uint64 fill_watermark = 7;
      uint64 segment_count = 8;
      uint64 storage_bytes = 9;
      optional string successor_recording_id = 10;
    }

    uint64 recording_storage_bytes = 1;
    uint64 recording_file_count = 2;
    uint64 active_query_count = 3;
    uint64 replay_read_bytes = 5;
    repeated ReplayOperatorStatistics operator_statistics = 4;
    repeated RecordingStatus recording_statuses = 6;
  }

  message ActiveQuery {
    NES.SerializableQueryId query_id = 1;
    optional uint64 started_unix_timestamp_in_milli_seconds = 2;
  }

  message TerminatedQuery {
    NES.SerializableQueryId query_id = 1;
    optional uint64 started_unix_timestamp_in_milli_seconds = 2;
    uint64 terminated_unix_timestamp_in_milli_seconds = 3;
    optional Error error = 4;
  }

  uint64 after_unix_timestamp_in_milli_seconds = 3;
  uint64 until_unix_timestamp_in_milli_seconds = 4;
  repeated ActiveQuery active_queries = 1;
  repeated TerminatedQuery terminated_queries = 2;
  ReplayMetrics replay_metrics = 5;
}
