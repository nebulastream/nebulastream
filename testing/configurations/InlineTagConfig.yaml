# Nautilus Tagged Inline Configuration
#
# Controls which NAUTILUS_TAGGED_INLINE(tag) annotations expand to NAUTILUS_INLINE.
# After editing, reconfigure CMake and rebuild.
#
# Tags listed under 'enable' get inlined. Tags under 'disable' are explicitly disabled.
# Tags used in code but not listed here cause a compile error.
# Multiple functions can share the same tag.

enable:
  - lazy_overload
#  - output_parse
#  - input_parse

disable:
  - output_parse
  - input_parse
#  - lazy_overload
