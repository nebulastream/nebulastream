# Unified Rust workspace for all NebulaStream Rust crates.
# Add new crates here when introducing Rust code in any part of the project.
[workspace]
resolver = "2"
members = [
    "nes-io-runtime/rust/nes-io-runtime",
    "nes-memory/rust/nes-buffer-bindings",
    "nes-memory/rust/nes-buffer-runtime",
    "nes-sources/rust/nes-source-bindings",
    "nes-sinks/rust/nes-sink-bindings",
    "nes-sources/rust/nes-source-runtime",
    "nes-sources/rust/nes-source-registry",
    "nes-sinks/rust/nes-sink-runtime",
    "nes-plugins/tokio-tcp-source",
    "nes-plugins/tokio-file-sink",
    "nes-network/nes-network-bindings",
    "nes-network/network",
    "nes-network/nes-network-bindings/network",
    "nes-common/rust/spdlog-bindings",
    "nes-plugins/Functions/RustAnswer/rust",
]

# Shared dependency declarations. Member crates use `dep.workspace = true`.
[workspace.dependencies]
nes_io_runtime = { path = "nes-io-runtime/rust/nes-io-runtime" }
nes_buffer_bindings = { path = "nes-memory/rust/nes-buffer-bindings" }
nes_buffer_runtime = { path = "nes-memory/rust/nes-buffer-runtime" }
nes_source_runtime = { path = "nes-sources/rust/nes-source-runtime" }
nes_source_registry = { path = "nes-sources/rust/nes-source-registry" }
nes_tokio_tcp_source = { path = "nes-plugins/tokio-tcp-source" }
nes_sink_runtime = { path = "nes-sinks/rust/nes-sink-runtime" }
nes_tokio_file_sink = { path = "nes-plugins/tokio-file-sink" }
nes_network = { path = "nes-network/network" }
network_bindings = { path = "nes-network/nes-network-bindings/network" }
