# Framework-generic fault-injection sidecar (design §7). Merged with -f
# alongside the plugin + runner compose files only when a plugin binds a
# needs_link (fault) scenario. toxiproxy is a TCP forwarder controlled over HTTP at
# toxiproxy:8474 by compose DNS — the same trust model as broker:1883, with no
# docker socket and no container ids. The runner reroutes the connector's
# endpoint to toxiproxy:<port> and cut()s/restore()s the proxy to sever and
# heal the connection deterministically.
#
# Official image (first-party provenance, multi-arch incl. arm64, GHCR avoids
# Docker Hub anonymous pull-rate limits). It is a from-scratch image with no
# shell or nc, so there is no container healthcheck: the runner's Link.create()
# polls the HTTP control API until it answers before creating the proxy.
services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    command: ["-host=0.0.0.0"]
