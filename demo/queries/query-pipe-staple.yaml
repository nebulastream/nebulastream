query: |
  SELECT
  VARSIZED("manufacturing-anomaly") AS event,
  VARSIZED("pipe_staple") AS component_type,
  id AS component_id,
  anomaly_score,
  timestamp AS timestamp
  FROM MODEL_INFERENCE(pipe_staple_pca, (SELECT id, timestamp, AUTOVI_PREPROCESS_IMAGE(FROM_BASE64(data)) AS pixels FROM PIPE_STABLE))
  WHERE anomaly_score > FLOAT32(0.9)
  INTO KAFKA_SINK;
models:
  - name: pipe_staple_pca
    path: demo/models/pipe_staple_pca.onnx
    input:
      - name: pixels
        type: VARSIZED
    output:
      - name: anomaly_score
        type: FLOAT32
sinks:
  - name: KAFKA_SINK
    type: KAFKA
    schema:
      - name: event
        type: VARSIZED
      - name: component_type
        type: VARSIZED
      - name: component_id
        type: VARSIZED
      - name: anomaly_score
        type: FLOAT32
      - name: timestamp
        type: UINT64
    config:
      brokers: 'broker:29092'
      topic: process-intelligence
      output_format: JSON
    parser_config: {}
logical:
  - name: PIPE_STABLE
    schema:
      - name: ID
        type: VARSIZED
      - name: TIMESTAMP
        type: UINT64
      - name: WIDTH
        type: UINT64
      - name: HEIGHT
        type: UINT64
      - name: DATA
        type: VARSIZED
physical:
  - logical: PIPE_STABLE
    type: TCP
    parser_config:
      type: CSV
      tuple_delimiter: "\n"
      field_delimiter: ","
    source_config:
      socket_host: source-pipe-staple
      socket_port: 8080
      socket_buffer_size: 1
      flush_interval_ms: 1
      connect_timeout_seconds: 60