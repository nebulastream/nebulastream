<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MQTT media viewer</title>
  <script src="https://unpkg.com/paho-mqtt@1.1.0/paho-mqtt-min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; font: 16px system-ui, sans-serif; color: #1d2433; }
    .controls { display: flex; flex-wrap: wrap; gap: .75rem; align-items: end; padding: 1rem; background: #f4f6f8; border-radius: .5rem; }
    label { display: grid; gap: .3rem; font-weight: 600; }
    input, select, button { min-height: 2.3rem; padding: .35rem .5rem; font: inherit; }
    input { min-width: 17rem; }
    button { cursor: pointer; }
    #status { font-weight: 600; }
    .viewers { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; margin-top: 1rem; }
    .viewer { overflow: hidden; border: 1px solid #d5d9df; border-radius: .5rem; }
    .viewer header { padding: .75rem; background: #f4f6f8; }
    .time, .count { display: block; margin-top: .25rem; color: #536071; font-size: .9rem; }
    img { display: block; width: 100%; min-height: 200px; object-fit: contain; background: #171a20; }
    .audio { grid-column: 1 / -1; }
    canvas { display: block; width: 100%; height: 320px; background: #171a20; }
    @media (max-width: 700px) { .viewers { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>MQTT media viewer</h1>
  <div class="controls">
    <label>Broker WebSocket URL
      <input id="broker" value="ws://localhost:9001/mqtt" placeholder="wss://broker.example/mqtt">
    </label>
    <label>Discovery filter
      <input id="filter" value="#" title="Topics appear in the lists when matching messages arrive.">
    </label>
    <button id="connect">Connect</button>
    <span id="status" aria-live="polite">Disconnected</span>
  </div>

  <main class="viewers">
    <section class="viewer">
      <header>
        <label>Video stream 1 topic <select id="video-topic-1"><option value="rgb-image">rgb-image</option></select></label>
        <span class="time" id="time-1">No frame received</span>
      </header>
      <img id="image-1" alt="Latest image from video stream 1">
    </section>
    <section class="viewer">
      <header>
        <label>Video stream 2 topic <select id="video-topic-2"><option value="thermal-image">thermal-image</option></select></label>
        <span class="time" id="time-2">No frame received</span>
      </header>
      <img id="image-2" alt="Latest image from video stream 2">
    </section>
    <section class="viewer audio">
      <header>
        <label>Audio topic <select id="audio-topic"><option value="audio">audio</option></select></label>
        <span class="count" id="count">No samples received</span>
      </header>
      <canvas id="waveform" aria-label="Audio waveform"></canvas>
    </section>
  </main>

  <script>
    let client;
    const MAX_SAMPLES = 4096;
    const topics = new Set(['rgb-image', 'thermal-image', 'audio']);
    const samples = [];
    const status = document.querySelector('#status');
    const videoTopics = [document.querySelector('#video-topic-1'), document.querySelector('#video-topic-2')];
    const audioTopic = document.querySelector('#audio-topic');
    const selects = [...videoTopics, audioTopic];
    const count = document.querySelector('#count');
    const canvas = document.querySelector('#waveform');
    const context = canvas.getContext('2d');

    function drawWaveform() {
      const scale = window.devicePixelRatio || 1;
      const width = Math.round(canvas.clientWidth * scale);
      const height = Math.round(canvas.clientHeight * scale);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      context.clearRect(0, 0, width, height);
      context.strokeStyle = '#49566a';
      context.beginPath();
      context.moveTo(0, height / 2);
      context.lineTo(width, height / 2);
      context.stroke();
      if (!samples.length) return;

      context.strokeStyle = '#56d4ff';
      context.lineWidth = 2 * scale;
      context.beginPath();
      samples.forEach((sample, index) => {
        const x = index * width / Math.max(samples.length - 1, 1);
        const y = height * (1 - Math.max(-1, Math.min(1, sample))) / 2;
        index ? context.lineTo(x, y) : context.moveTo(x, y);
      });
      context.stroke();
    }

    function addTopic(name) {
      if (topics.has(name)) return;
      topics.add(name);
      for (const select of selects) {
        if (select.options.length === 1 && !select.value) select.options[0].text = 'Choose a topic';
        select.add(new Option(name, name));
      }
    }

    function showFrame(number, frame) {
      if (!Number.isFinite(frame.timestamp) || typeof frame.image !== 'string') return;
      const image = document.querySelector(`#image-${number}`);
      const time = document.querySelector(`#time-${number}`);
      image.src = frame.image.startsWith('data:image/') ? frame.image : `data:image/jpeg;base64,${frame.image}`;
      time.textContent = new Date(frame.timestamp).toLocaleString();
      time.title = `${frame.timestamp} ms`;
    }

    function appendSamples(payload) {
      const values = payload.split(/[\s,]+/).map(Number).filter(Number.isFinite);
      if (!values.length) return;
      samples.push(...values);
      samples.splice(0, Math.max(0, samples.length - MAX_SAMPLES));
      count.textContent = `${samples.length.toLocaleString()} samples shown`;
      drawWaveform();
    }

    function connect() {
      if (client?.isConnected()) client.disconnect();
      let url;
      try { url = new URL(document.querySelector('#broker').value); }
      catch { status.textContent = 'Enter a valid ws:// or wss:// URL'; return; }
      if (!['ws:', 'wss:'].includes(url.protocol)) { status.textContent = 'URL must use ws:// or wss://'; return; }

      const port = Number(url.port || (url.protocol === 'wss:' ? 443 : 80));
      client = new Paho.Client(url.hostname, port, url.pathname + url.search, `media-viewer-${crypto.randomUUID()}`);
      client.onConnectionLost = response => { status.textContent = `Disconnected${response.errorMessage ? `: ${response.errorMessage}` : ''}`; };
      client.onMessageArrived = message => {
        addTopic(message.destinationName);
        if (audioTopic.value === message.destinationName) appendSamples(message.payloadString);
        if (videoTopics.some(select => select.value === message.destinationName)) {
          try {
            const frame = JSON.parse(message.payloadString);
            videoTopics.forEach((select, index) => { if (select.value === message.destinationName) showFrame(index + 1, frame); });
          } catch { /* Ignore non-image messages selected as video topics. */ }
        }
      };
      status.textContent = 'Connecting…';
      client.connect({
        useSSL: url.protocol === 'wss:',
        onSuccess: () => {
          client.subscribe(document.querySelector('#filter').value || '#');
          status.textContent = 'Connected — waiting for media';
          document.querySelector('#connect').textContent = 'Reconnect';
        },
        onFailure: error => { status.textContent = `Connection failed: ${error.errorMessage}`; },
      });
    }

    audioTopic.addEventListener('change', () => {
      samples.length = 0;
      count.textContent = 'No samples received';
      drawWaveform();
    });
    window.addEventListener('resize', drawWaveform);
    document.querySelector('#connect').addEventListener('click', connect);
    drawWaveform();
  </script>
</body>
</html>
