[package]
name = "nes_tokio_tcp_source"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["rlib"]

[package.metadata.nes]
plugin_type = "source"
plugin_name = "TokioTcp"
type_name = "TcpSource"
factory = "create_tcp_source"
schema = "CONFIG_SCHEMA"

[dependencies]
nes_source_runtime.workspace = true
tokio = { version = "1.40.0", features = ["net", "time", "io-util"] }
tokio-util = { version = "0.7.13", features = ["rt"] }
tracing = "0.1"
linkme = "0.3"
