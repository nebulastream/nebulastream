# Per-plugin conn-test dependency declaration (uv workspace member).
#
# The MQTTSink loader (`loader.py`) reads published messages back from an MQTT
# broker via the paho-mqtt client. Declaring it here — not in the shared
# runner pyproject — is the plugin-encapsulation contract: adding/removing
# this connector touches only its own directory. `package = false` because the
# loader is loaded by the runner's importlib discovery as a loose module,
# never built as a package; this member contributes its dependency only. The
# repo-root workspace assembles the union via `uv sync --all-packages` (see
# /pyproject.toml).
#
# `>=2,<3` pins paho-mqtt 2.x: the loader uses the VERSION2 callback API
# (`CallbackAPIVersion`, introduced in 2.0), and 3.x drops the v1 fallback
# entirely. 2.x ships the `wait_for_publish(timeout=...)` API the loader relies
# on for durability.

[project]
name = "conntest-plugin-mqttsink"
version = "0"
requires-python = ">=3.12"
dependencies = ["paho-mqtt>=2,<3"]

[tool.uv]
package = false
