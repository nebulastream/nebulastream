# Topology:
#
#   ┌─────────────────────────┐
#   │  worker-1  (cap: 10000) │
#   │  S: GENERATOR_SOURCE    │
#   │  K: VOID_SINK           │
#   └─────────────────────────┘
#
#   Single worker hosts both source and sink.
#   No downstream connections (standalone node).

query: |
  SELECT 
    *
  FROM 
    GENERATOR
  INTO 
    MQTT
sinks:
  - name: MQTT
    host: worker-1:8080
    schema:
      - name: GENERATOR$NUMBER
        type: UINT64
    type: MQTT
    config:
      output_format: CSV
      server_uri: mqtt-broker
      topic: mqtt-sink-test
      client_id: nes-test-client
      qos: 2

logical:
  - name: GENERATOR
    schema:
      - name: NUMBER
        type: UINT64

physical:
  - logical: GENERATOR
    host: worker-1:8080
    parser_config:
      type: CSV
      fieldDelimiter: ","
    type: GENERATOR
    source_config:
      stop_generator_when_sequence_finishes: ALL
      generator_schema: |
        SEQUENCE UINT64 1 10 1

workers:
  - host: worker-1:8080
    data_address: worker-1:9090
    max_operators: 10000
