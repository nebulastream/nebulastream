# Suite-specific compose overlay: spins up an MQTT broker and an auxiliary
# client container for the MQTT source tests. Merged with the generated
# frontend.compose.yaml + workers.compose.yaml by setup_distributed.

services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    configs:
      - source: mosquitto_conf
        target: /mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "healthcheck", "-m", "test", "-q", "1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  mqtt-client:
    image: eclipse-mosquitto:2
    command: ["sleep", "infinity"]
    depends_on:
      mqtt-broker:
        condition: service_healthy

configs:
  mosquitto_conf:
    content: |
      listener 1883
      allow_anonymous true
      persistence true
      persistence_location /mosquitto/data/
      retain_available true
