# Profile manifest read by the in-binary external_systest dispatcher
# (nes-systests/systest/src/ExternalSystestDispatch.cpp). A .test file
# selects this profile via `# requires: <name>`; the dispatcher allocates
# one free host port per endpoint, then exports:
#   <ENDPOINT>_PORT                     — host port (for compose `${...}` substitution)
#   NES_EXTERNAL_ENDPOINT_<ENDPOINT>    — "<host>:<port>" pair (for plugin registrars)
#   NES_EXTERNAL_HOST                   — host address the test process should
#                                         use to reach the broker; 127.0.0.1 on
#                                         the host, host.docker.internal inside
#                                         the CLion dev-container toolchain.
# Endpoint names are uppercased; the MQTT plugin reads
# NES_EXTERNAL_ENDPOINT_BROKER.

name: mqtt
endpoints:
  - name: broker
    container_port: 1883
