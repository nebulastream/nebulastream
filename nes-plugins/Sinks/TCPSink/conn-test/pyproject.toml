# Per-plugin conn-test dependency declaration (uv workspace member).
#
# The TCPSink loader (`loader.py`) and the relay data service (`tcp_relay.py`)
# use only the Python stdlib (`socket`, `threading`), so there are no
# dependencies — but the member file must exist: the repo-root workspace globs
# make every conn-test/ dir a member, and uv fails the whole resolve on a
# member without a pyproject.toml. `package = false` because the loader is
# loaded by the runner's importlib discovery as a loose module, never built as
# a package.

[project]
name = "conntest-plugin-tcpsink"
version = "0"
requires-python = ">=3.12"
dependencies = []

[tool.uv]
package = false
