# Topology for variable-sized data test through pipe.
# Generator produces tuples with a UINT64 id and a VARSIZED string field.
# PipeSource must copy child buffers (holding varsized data) — if it only
# copies the main buffer, the consumer will read garbage or crash.

sinks:
  - name: PIPE_SINK
    host: worker-node:8080
    schema:
      - { name: id, type: UINT64 }
      - { name: payload, type: VARSIZED }
    type: Pipe
    config:
      pipe_name: "varsized_test"
    parser_config: { }
  - name: FILE_SINK
    host: worker-node:8080
    schema:
      - { name: id, type: UINT64 }
      - { name: payload, type: VARSIZED }
    type: File
    config:
      output_format: CSV
      file_path: "/workdir/worker-node/varsized_output.csv"
    parser_config: { }

logical:
  - name: GEN
    schema:
      - { name: id, type: UINT64 }
      - { name: payload, type: VARSIZED }
  - name: READER
    schema:
      - { name: id, type: UINT64 }
      - { name: payload, type: VARSIZED }

physical:
  - logical: GEN
    host: worker-node:8080
    parser_config:
      type: CSV
      field_delimiter: ","
    type: Generator
    source_config:
      stop_generator_when_sequence_finishes: ALL
      seed: 1
      generator_rate_type: FIXED
      generator_rate_config: "emit_rate 1000"
      generator_schema: |
        SEQUENCE UINT64 0 1000 1, RANDOMSTR 10 50
  - logical: READER
    host: worker-node:8080
    parser_config:
      type: NATIVE
    type: Pipe
    source_config:
      pipe_name: "varsized_test"

workers:
  - host: worker-node:8080
    data_address: worker-node:9090
    max_operators: 10000
