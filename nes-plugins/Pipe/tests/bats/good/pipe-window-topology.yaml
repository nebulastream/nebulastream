# Topology for pipe + tumbling window test.
# Generator produces (id, value, ts) → pipe sink "events".
# Multiple consumers read from pipe source → tumbling window count → void sink.

sinks:
  - name: PIPE_SINK
    schema:
      - name: GEN$id
        type: UINT64
      - name: GEN$value
        type: UINT64
      - name: GEN$ts
        type: UINT64
    type: Pipe
    config:
      pipe_name: "events"
    parser_config: { }
  - name: VOID_SINK
    schema:
      - name: READER$id
        type: UINT64
      - name: READER$value
        type: UINT64
      - name: READER$ts
        type: UINT64
    type: Void
    config: { }
    parser_config: { }
  - name: WINDOW_SINK
    schema:
      - name: READER$id_count
        type: UINT64
    type: Void
    config: { }
    parser_config: { }

logical:
  - name: GEN
    schema:
      - name: id
        type: UINT64
      - name: value
        type: UINT64
      - name: ts
        type: UINT64
  - name: READER
    schema:
      - name: id
        type: UINT64
      - name: value
        type: UINT64
      - name: ts
        type: UINT64

physical:
  - logical: GEN
    parser_config:
      type: CSV
      fieldDelimiter: ","
    type: Generator
    source_config:
      stop_generator_when_sequence_finishes: NONE
      seed: 1
      generator_rate_type: FIXED
      generator_rate_config: "emit_rate 1000"
      generator_schema: |
        SEQUENCE UINT64 0 100 1, SEQUENCE UINT64 0 50 1, SEQUENCE UINT64 1000 10000 100
  - logical: READER
    parser_config:
      type: NATIVE
    type: Pipe
    source_config:
      pipe_name: "events"
