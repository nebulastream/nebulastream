# Topology for independent pipe test: pipe_a

sinks:
  - name: PIPE_SINK_A
    schema:
      - name: GEN_A$id
        type: UINT64
    type: Pipe
    config:
      pipe_name: "pipe_a"
    parser_config: { }
  - name: VOID_SINK_A
    schema:
      - name: READER_A$id
        type: UINT64
    type: Void
    config: { }
    parser_config: { }

logical:
  - name: GEN_A
    schema:
      - name: id
        type: UINT64
  - name: READER_A
    schema:
      - name: id
        type: UINT64

physical:
  - logical: GEN_A
    parser_config:
      type: CSV
      fieldDelimiter: ","
    type: Generator
    source_config:
      stop_generator_when_sequence_finishes: NONE
      seed: 1
      generator_rate_type: FIXED
      generator_rate_config: "emit_rate 100"
      generator_schema: |
        SEQUENCE UINT64 0 1000 1
  - logical: READER_A
    parser_config:
      type: NATIVE
    type: Pipe
    source_config:
      pipe_name: "pipe_a"
