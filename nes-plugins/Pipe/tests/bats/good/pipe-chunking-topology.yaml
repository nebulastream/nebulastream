      - { name: "READER$v29", type: UINT8 }
      - { name: "READER$v30", type: UINT8 }
      - { name: "READER$v31", type: UINT8 }
      - { name: "READER$v32", type: UINT8 }
      - { name: "READER$v33", type: UINT8 }
      - { name: "READER$v34", type: UINT8 }
      - { name: "READER$v35", type: UINT8 }
      - { name: "READER$v36", type: UINT8 }
      - { name: "READER$v37", type: UINT8 }
      - { name: "READER$v38", type: UINT8 }
      - { name: "READER$v39", type: UINT8 }
      - { name: "READER$v40", type: UINT8 }
      - { name: "READER$ts", type: UINT64 }
    type: Void
    config: { }
