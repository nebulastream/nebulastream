# Topology to trigger aggressive chunking through the pipe WITH window aggregation.
# Generator produces (val UINT8, ts UINT64).
# Projection expands val to 40 UINT8 fields + keeps ts before writing to pipe sink.
# This causes each input buffer to split into ~40 output buffer chunks.
# Consumer reads chunked data from pipe source and runs a tumbling window aggregation.

sinks:
  - name: PIPE_SINK
    schema:
      - { name: "GEN$val", type: UINT8 }
      - { name: "V02", type: UINT8 }
      - { name: "V03", type: UINT8 }
      - { name: "V04", type: UINT8 }
      - { name: "V05", type: UINT8 }
      - { name: "V06", type: UINT8 }
      - { name: "V07", type: UINT8 }
      - { name: "V08", type: UINT8 }
      - { name: "V09", type: UINT8 }
      - { name: "V10", type: UINT8 }
      - { name: "V11", type: UINT8 }
      - { name: "V12", type: UINT8 }
      - { name: "V13", type: UINT8 }
      - { name: "V14", type: UINT8 }
      - { name: "V15", type: UINT8 }
      - { name: "V16", type: UINT8 }
      - { name: "V17", type: UINT8 }
      - { name: "V18", type: UINT8 }
      - { name: "V19", type: UINT8 }
      - { name: "V20", type: UINT8 }
      - { name: "V21", type: UINT8 }
      - { name: "V22", type: UINT8 }
      - { name: "V23", type: UINT8 }
      - { name: "V24", type: UINT8 }
      - { name: "V25", type: UINT8 }
      - { name: "V26", type: UINT8 }
      - { name: "V27", type: UINT8 }
      - { name: "V28", type: UINT8 }
      - { name: "V29", type: UINT8 }
      - { name: "V30", type: UINT8 }
      - { name: "V31", type: UINT8 }
      - { name: "V32", type: UINT8 }
      - { name: "V33", type: UINT8 }
      - { name: "V34", type: UINT8 }
      - { name: "V35", type: UINT8 }
      - { name: "V36", type: UINT8 }
      - { name: "V37", type: UINT8 }
      - { name: "V38", type: UINT8 }
      - { name: "V39", type: UINT8 }
      - { name: "V40", type: UINT8 }
      - { name: "GEN$ts", type: UINT64 }
    type: Pipe
    config:
      pipe_name: "chunked_pipe"
    parser_config: { }
  - name: PASSTHROUGH_SINK
    schema:
      - { name: "READER$val", type: UINT8 }
      - { name: "READER$v02", type: UINT8 }
      - { name: "READER$v03", type: UINT8 }
      - { name: "READER$v04", type: UINT8 }
      - { name: "READER$v05", type: UINT8 }
      - { name: "READER$v06", type: UINT8 }
      - { name: "READER$v07", type: UINT8 }
      - { name: "READER$v08", type: UINT8 }
      - { name: "READER$v09", type: UINT8 }
      - { name: "READER$v10", type: UINT8 }
      - { name: "READER$v11", type: UINT8 }
      - { name: "READER$v12", type: UINT8 }
      - { name: "READER$v13", type: UINT8 }
      - { name: "READER$v14", type: UINT8 }
      - { name: "READER$v15", type: UINT8 }
      - { name: "READER$v16", type: UINT8 }
      - { name: "READER$v17", type: UINT8 }
      - { name: "READER$v18", type: UINT8 }
      - { name: "READER$v19", type: UINT8 }
      - { name: "READER$v20", type: UINT8 }
      - { name: "READER$v21", type: UINT8 }
      - { name: "READER$v22", type: UINT8 }
