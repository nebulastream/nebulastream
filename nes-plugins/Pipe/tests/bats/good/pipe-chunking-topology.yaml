physical:
  - logical: GEN
    parser_config:
      type: CSV
      fieldDelimiter: ","
    type: Generator
    source_config:
      stop_generator_when_sequence_finishes: NONE
      seed: 1
      generator_rate_type: FIXED
      generator_rate_config: "emit_rate 1000"
      generator_schema: |
        SEQUENCE UINT8 0 255 1, SEQUENCE UINT64 1000 100000 100
  - logical: READER
    parser_config:
      type: NATIVE
    type: Pipe
    source_config:
      pipe_name: "chunked_pipe"
