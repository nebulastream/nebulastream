# ODBC profile for external_systest. Standalone — a single PostgreSQL service.
# Brought up + torn down by the in-binary dispatcher in ExternalSystestDispatch.cpp;
# the systest binary runs the test in-process and connects over a host port.
#
# PostgreSQL's first-boot init (initdb + every `*.sql` in
# /docker-entrypoint-initdb.d) runs against a *temporary* server that listens
# on the Unix socket only (`listen_addresses=''`) — it never opens a TCP port.
# The real, TCP-listening server starts only after that init finishes. The
# healthcheck below therefore probes over TCP (`pg_isready -h 127.0.0.1`): a
# socket-based `pg_isready` reports "accepting" during the temp-server window
# and would let `docker compose up --wait` return before the schema is seeded
# and before the port the systest connects to is open. TCP-probing makes the
# healthcheck (and `--wait`) pass only once the real server is up and seeded —
# no separate init service needed.
#
# Env vars expanded by docker compose at up-time (exported by the dispatcher):
#   PROFILE_VOLUME — docker-managed volume the dispatcher populated with this
#                    directory's contents (init-db.sql + the yaml files).
#                    Mounted read-only at /docker-entrypoint-initdb.d; Postgres
#                    only executes the *.sql file and ignores the rest.
#   DATABASE_PORT  — random free host port the dispatcher allocated for the
#                    `database` endpoint in profile.yaml.
#   DATABASE_CONTAINER_PORT — the `container_port:` from profile.yaml (5432).

services:
  odbc_database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nes
      POSTGRES_PASSWORD: nes
      POSTGRES_DB: nebulastream
    volumes:
      - profile:/docker-entrypoint-initdb.d:ro
    # Bind on all interfaces (0.0.0.0) so the systest binary can reach the
    # database whether it runs on the host (127.0.0.1) or inside the dev
    # container (host.docker.internal). The container-side port comes from
    # profile.yaml via the dispatcher's ${DATABASE_CONTAINER_PORT} export.
    ports:
      - "${DATABASE_PORT}:${DATABASE_CONTAINER_PORT}"
    healthcheck:
      # `-h 127.0.0.1` forces a TCP probe — see the note above: a socket-based
      # `pg_isready` passes during postgres' temp-server init phase and lets
      # `docker compose up --wait` return before the real server's port is open.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U nes -d nebulastream"]
      interval: 3s
      timeout: 3s
      retries: 20
      # initdb + the seed script run before the real (TCP) server opens its
      # port; give that first-boot window generous headroom under sanitizer /
      # loaded-CI conditions before healthcheck failures start counting.
      start_period: 30s
      start_interval: 500ms

# Logical volume name `profile` is bound to the externally-created docker
# volume the dispatcher staged. Compose's schema requires the volumes key
# to be a literal identifier, so the variable substitution lives on `name:`.
volumes:
  profile:
    external: true
    name: ${PROFILE_VOLUME}
