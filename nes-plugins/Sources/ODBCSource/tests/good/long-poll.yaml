# Variant of example.yaml with a long poll interval and a FILE sink so
# the test can observe the incremental write that happens after the
# first poll fires.

query: |
  SELECT
    *
  FROM
    ODBC
  INTO
    FILE
sinks:
  - name: FILE
    host: worker-1:8080
    schema:
      - name: ODBC$ID
        type: INT32
    type: File
    config:
      output_format: CSV
      file_path: results.csv

logical:
  - name: ODBC
    schema:
      - name: ID
        type: INT32

physical:
  - logical: ODBC
    host: worker-1:8080
    parser_config:
      type: Native
    type: ODBC
    source_config:
      host: postgres
      port: "5432"
      database: nesdb
      username: nes
      password: nes
      driver: PostgreSQL
      sync_table: events
      trust_server_certificate: true
      poll_interval_ms: 5000
      query: |
        SELECT id FROM events WHERE created_at > ? AND created_at <= ? ORDER BY created_at ASC

workers:
  - host: worker-1:8080
    data_address: worker-1:9090
    max_operators: 10000
