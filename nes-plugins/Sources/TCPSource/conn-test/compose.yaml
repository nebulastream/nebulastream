# TCP data-service topology for the conn-test harness. Owned by the TCP
# source plugin's conn-test surface (`nes-plugins/Sources/TCPSource/conn-test/`);
# the `conntest` CLI discovers it via the `nes-plugins/**/conn-test/
# compose.yaml` glob.
#
# This file declares ONLY the plugin's data service. The framework's `runner`
# service (the dev-image container that hosts pytest + conntest-harness) lives
# once in `nes-conn-test/runner/runner.compose.yaml` and is merged on top at
# run time.
#
# * `relay` — plain TCP has no broker, so the data service is the sibling
#   tcp_relay.py (stdlib-only) on a stock python:alpine image, mounted via the
#   framework's setup_file mechanism — the same pattern as mounting
#   mosquitto.conf into the stock mosquitto image. It pairs the connector-side
#   connection (port 9000, exposed below — faulted via toxiproxy in needs_link
#   scenarios) with the loader-side connection (port 9001, internal — the
#   oracle path, never faulted) and pipes bytes between them. See tcp_relay.py
#   for the full port + lifecycle contract.
#
# Topology is framework-owned: discovery derives the connector endpoint
# (`relay:9000`) from THIS file — the sole service name and its `expose:`
# port — so the loader declares no compose_service / compose_port.
#
# Required env var (set by the `conntest` CLI):
#
#   HOST_NEBULASTREAM_ROOT  host path to the repo root. `docker compose`
#                           runs against the host daemon, which resolves
#                           bind-mount *sources* from the host — so the
#                           tcp_relay.py source must be an absolute host path.

services:
  relay:
    image: python:3.12-alpine
    expose: ["9000"]  # the framework derives the connector endpoint from this
    command: ["python", "-u", "/conntest/tcp_relay.py"]
    volumes:
      # Bind-mount the relay script read-only. Absolute host path because
      # `docker compose` runs against the host daemon; the daemon resolves
      # bind paths from the host.
      - ${HOST_NEBULASTREAM_ROOT}/nes-plugins/Sources/TCPSource/conn-test/${CONNTEST_SETUP_FILE:?CONNTEST_SETUP_FILE required}:/conntest/tcp_relay.py:ro
    healthcheck:
      # The relay's dedicated health port (9002) accepts and closes; a probe
      # there never disturbs a connector/loader session. A successful connect
      # means the accept loop is up on all listeners (they bind before it).
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 9002), timeout=2).close()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
      # Tight start_interval (the poll rate during start_period) makes
      # `--wait` unblock within ~200ms of the relay coming up rather
      # than the 5s-default interval.
      start_interval: 200ms
