# Broker config for the outage_delivery scenario: same as mosquitto.conf but
# with queue_qos0_messages enabled. For a durable client (clean_session=false)
# that is offline, mosquitto queues QoS-0 messages published to its
# subscription ONLY when this is true (it defaults to false — see
# mosquitto.conf, which the outage_loss scenario uses to show the drop). So a
# QoS-0 buffer published during a toxiproxy outage is buffered here and
# delivered, in order, on reconnect.

listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
retain_available true

max_queued_messages 0
max_inflight_messages 200

# Queue QoS-0 messages for offline durable clients (default is false).
queue_qos0_messages true
