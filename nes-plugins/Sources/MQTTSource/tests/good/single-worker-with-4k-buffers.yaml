# Topology:
#
#   ┌─────────────────────────┐
#   │  worker-1  (cap: 10000) │
#   │  S: GENERATOR_SOURCE    │
#   │  K: VOID_SINK           │
#   └─────────────────────────┘
#
#   Single worker hosts both source and sink.
#   No downstream connections (standalone node).

workers:
  - host: worker-1:8080
    data_address: worker-1:9090
    max_operators: 10000
    config:
      worker:
        default_query_execution:
          operator_buffer_size: 4096

logical: [ ]