# MQTT profile for external_systest. Merged with
# scripts/testing/external_systest_base.compose.yaml at test time.
#
# Only the broker — test data is materialised inside systest by the MQTT
# source plugin's InlineData / FileData registrars
# (RegisterMQTT{Inline,File}Data in MQTTSource.cpp). They publish the
# rows declared in the .test file's `ATTACH INLINE` / `ATTACH FILE` to
# retained topics before the source subscribes. The old `mqtt_producer`
# service that read a sibling mqtt-data.jsonl is gone; the data now
# lives next to the queries in the .test file.
#
# /profile inside the container is this directory, mounted read-only as
# a docker volume by the bats runner. Only mosquitto.conf reads from it
# today; aux files (TLS certs, ACLs, ...) would go here too.

services:
  # Gate the base `systest` service on the broker being healthy so the
  # plugin's data-publishing path can connect immediately on test start.
  systest:
    depends_on:
      mqtt_broker:
        condition: service_healthy

  mqtt_broker:
    image: eclipse-mosquitto:2.0
    command: ["/usr/sbin/mosquitto", "-c", "/profile/mosquitto.conf"]
    volumes:
      - profile:/profile:ro
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "healthcheck", "-m", "test", "-q", "1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
