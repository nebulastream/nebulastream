listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
retain_available true

# These bumps are required for any high-throughput MQTT systest, not just
# retained-replay scenarios. mosquitto's per-subscriber outgoing queue
# defaults to 1000 messages and silently drops anything above the cap; with
# a 100K-row data file the broker can drop most of the stream before the
# source can drain it (resulting in random-looking partial row counts).
#
# 0 = unlimited; safe because the test container is short-lived and the
# upper bound on memory is the test's input data.
# max_inflight_messages raises the QoS=1 window so PUBACK round-trips stop
# being the per-message throughput cap.
max_queued_messages 0
max_inflight_messages 200
