[package]
name = "network_source"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["rlib"]
path = "src/network_source.rs"

[features]
default = ["runtime"]
validation = []
runtime = [
    "validation",
    "dep:async-trait",
    "dep:nes_buffer_runtime",
    "dep:nes_io_runtime",
    "dep:nes_network",
    "dep:nes_source_runtime",
]

[dependencies]
nes_source_validation.workspace = true
linkme.workspace = true
tracing = "0.1"

nes_buffer_runtime = { workspace = true, optional = true }
nes_io_runtime = { workspace = true, optional = true }
nes_network = { workspace = true, optional = true }
nes_source_runtime = { workspace = true, optional = true }
async-trait = { workspace = true, optional = true }
