<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ (resources.Get "scss/style.scss" | css.Sass).Permalink }}">
</head>
<body>
  {{ partial "header.html" . }}
  <div class="page">
    {{ block "main" . }}{{ end }}
  </div>
  {{ partial "footer.html" . }}
</body>
</html>
