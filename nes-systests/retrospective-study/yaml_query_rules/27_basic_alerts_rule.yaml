#  [27] PTT,Plasma,PTT,Gerinnung,s,3173-2,>90 s,24
query: |
  SELECT LabVal_ID, mlife_FallNr, Zeitpunkt, Bez, VarSizedToDouble(Wert) AS wert_double, Einheit, Wertebereich, SampleNr, TSFail, TSLog, Lab_ID
  FROM odbc_source_27
  WHERE Bez = VARSIZED("PTT") AND not (IsNaN(VarSizedToDouble(Wert))) AND VarSizedToDouble(Wert) > FLOAT64(90)
  INTO File('results/output_27.csv' AS `SINK`.FILE_PATH,'CSV' as `SINK`.INPUT_FORMAT)
logical:
  - name: odbc_source_27
    schema:
      - name: LabVal_ID
        type: INT32
      - name: mlife_FallNr
        type: INT32
      - name: Zeitpunkt
        type: UINT64
      - name: GruppenNr
        type: INT32
      - name: Gruppe
        type: VARSIZED
      - name: Bez
        type: VARSIZED
      - name: Wert
        type: VARSIZED
      - name: Einheit
        type: VARSIZED
      - name: Wertebereich
        type: VARSIZED
      - name: SampleNr
        type: VARSIZED
      - name: TSFail
        type: UINT64
      - name: TSLog
        type: UINT64
      - name: Lab_ID
        type: INT32
physical:
  - logical: odbc_source_27
    type: ODBC
    parser_config:
      type: Native
    source_config:
      host: "localhost"
      port: "1433"
      database: "master"
      username: "sa"
      password: "samplePassword1!"
      driver: "ODBC Driver 18 for SQL Server"
      sync_table: "dbo.v_Labor_null"
      poll_interval_ms: 1000
      query: "SELECT LabVal_ID, mlife_FallNr, Zeitpunkt, GruppenNr, Gruppe, Bez, Wert, Einheit, Wertebereich, SampleNr, TSFail, TSLog, Lab_ID FROM dbo.v_Labor_null"
      trust_server_certificate: true
sinks: []
