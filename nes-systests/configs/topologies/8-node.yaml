# Topology:
#
#   ┌───────────────────────┐
#   │ source-node-1:8080 (S)│──┐
#   │ capacity: 100         │  │
#   └───────────────────────┘  │
#   ┌───────────────────────┐  │   ┌───────────────────────────┐
#   │ source-node-2:8080 (S)│──┤   │ intermediate-node-1:8080  │
#   │ capacity: 1           │  ├──►│ capacity: 4               │──┐
#   └───────────────────────┘  │   └───────────────────────────┘  │
#   ┌───────────────────────┐  │                                  │  ┌────────────────────────┐
#   │ source-node-3:8080 (S)│──┤                                  ├─►│ sink-node:8080 (K)     │
#   │ capacity: 1           │  │                                  │  │ capacity: 10000        │
#   └───────────────────────┘  │   ┌───────────────────────────┐  │  └────────────────────────┘
#   ┌───────────────────────┐  │   │ intermediate-node-2:8080  │  │
#   │ source-node-4:8080 (S)│──┤   │ capacity: 4               │──┘
#   │ capacity: 1           │  ├──►└───────────────────────────┘
#   └───────────────────────┘  │
#   ┌───────────────────────┐  │
#   │ source-node-5:8080 (S)│──┘
#   │ capacity: 1           │
#   └───────────────────────┘
#
workers:
  - host: "sink-node:8080"
    data_address: "sink-node:9090"
    max_operators: 10000
    config:
      worker:
        default_query_execution:
          execution_mode: INTERPRETER

  - host: "intermediate-node-1:8080"
    data_address: "intermediate-node-1:9090"
    max_operators: 4
    downstream:
      - "sink-node:8080"
    config:
      worker:
        default_query_execution:
          execution_mode: INTERPRETER

  - host: "intermediate-node-2:8080"
    data_address: "intermediate-node-2:9090"
    max_operators: 4
    downstream:
      - "sink-node:8080"
    config:
      worker:
        default_query_execution:
          execution_mode: INTERPRETER

  - host: "source-node-1:8080"
    data_address: "source-node-1:9090"
    max_operators: 100
    downstream:
      - "intermediate-node-1:8080"
      - "intermediate-node-2:8080"
    config:
      worker:
        default_query_execution:
          execution_mode: INTERPRETER

  - host: "source-node-2:8080"
    data_address: "source-node-2:9090"
    max_operators: 1
    downstream:
      - "intermediate-node-1:8080"
      - "intermediate-node-2:8080"
    config:
      worker:
        default_query_execution:
          execution_mode: INTERPRETER

  - host: "source-node-3:8080"
    data_address: "source-node-3:9090"
    max_operators: 1
    downstream:
      - "intermediate-node-1:8080"
      - "intermediate-node-2:8080"
    config:
      worker:
        default_query_execution:
          execution_mode: INTERPRETER

  - host: "source-node-4:8080"
    data_address: "source-node-4:9090"
    max_operators: 1
    downstream:
      - "intermediate-node-1:8080"
      - "intermediate-node-2:8080"
    config:
      worker:
        default_query_execution:
          execution_mode: INTERPRETER

  - host: "source-node-5:8080"
    data_address: "source-node-5:9090"
    max_operators: 1
    downstream:
      - "intermediate-node-1:8080"
      - "intermediate-node-2:8080"
    config:
      worker:
        default_query_execution:
          execution_mode: INTERPRETER

allow_source_placement:
  - "source-node-1:8080"
  - "source-node-2:8080"
  - "source-node-3:8080"
  - "source-node-4:8080"
  - "source-node-5:8080"

allow_sink_placement:
  - "sink-node:8080"
