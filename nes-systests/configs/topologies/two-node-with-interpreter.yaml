# Topology:
#
#   ┌──────────────────────────┐     ┌──────────────────────────┐
#   │ source-node:8080 (S)(K)  │────►│ sink-node:8080 (K)       │
#   │ capacity: 4              │     │ capacity: 10000          │
#   └──────────────────────────┘     └──────────────────────────┘
#
workers:
  - host: "sink-node:8080"
    data_address: "sink-node:9090"
    max_operators: 10000
  - host: "source-node:8080"
    data_address: "source-node:9090"
    max_operators: 4
    downstream:
      - "sink-node:8080"
allow_source_placement:
  - "source-node:8080"
allow_sink_placement:
  - "sink-node:8080"
  - "source-node:8080"
