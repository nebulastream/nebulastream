# Topology:
#
#   ┌──────────────────────────┐     ┌──────────────────────────┐
#   │ source-node:8080 (S)(K)  │────►│ sink-node:8080 (K)       │
#   │ capacity: 8              │     │ capacity: 10000          │
#   └──────────────────────────┘     └──────────────────────────┘
#
workers:
  - host: "sink-node:8080"
    data_address: "sink-node:9090"
    max_operators: 10000
    config:
      worker:
        # Fallback budget for standalone bats runs; CMake/distributed.bats overrides this
        # (WORKER_TOTAL_MEMORY_IN_BYTES) with 32 GiB when ENABLE_LARGE_TESTS=ON, 16 GiB otherwise.
        total_memory_in_bytes: 17179869184
        unpooled_memory_fraction: 0.8935
        query_engine:
          number_of_worker_threads: 8

  - host: "source-node:8080"
    data_address: "source-node:9090"
    max_operators: 8
    downstream:
      - "sink-node:8080"
    config:
      worker:
        # Fallback budget for standalone bats runs; CMake/distributed.bats overrides this
        # (WORKER_TOTAL_MEMORY_IN_BYTES) with 32 GiB when ENABLE_LARGE_TESTS=ON, 16 GiB otherwise.
        total_memory_in_bytes: 17179869184
        unpooled_memory_fraction: 0.8935
        query_engine:
          number_of_worker_threads: 4

allow_source_placement:
  - "source-node:8080"

allow_sink_placement:
  - "sink-node:8080"
  - "source-node:8080"
